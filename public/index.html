        </div>
      </div>
    </div>
  </div>);
}

function SalComposer({onBack,onSave}){
  const [step,setStep]=useState(1);
  const [selected,setSelected]=useState(new Set());
  const [saveName,setSaveName]=useState("");
  const [saveSaison,setSaveSaison]=useState("Été");
  const [showSave,setShowSave]=useState(false);
  const toggle=React.useCallback(id=>{setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});},[]);
  const steps=[
    {num:1,title:"Base",sub:"1-2 bases",cats:["bases"]},
    {num:2,title:"Verdures",sub:"0-2 verdures",cats:["verdures"]},
    {num:3,title:"Légumes",sub:"2-5 légumes",cats:["legumes_crus","legumes_cuits"]},
    {num:4,title:"Garnitures",sub:"Protéines, fromages, marinés, herbes",cats:["proteines","fromages","marines_pickles","herbes_fraiches"]},
    {num:5,title:"Finitions",sub:"Toppings & sauce",cats:["toppings","sauces"]},
  ];
  const cur=steps[step-1];
  const{cal,prot}=React.useMemo(()=>{
    let c=0,p=0;
    selected.forEach(id=>{const i=salIng(id);const po=(i.portion_g||i.portion_ml||20);c+=(i.cal_100g*po)/100;p+=((i.prot_100g||0)*po)/100;});
    return{cal:Math.round(c),prot:Math.round(p*10)/10};
  },[selected]);
  const applyCombo=combo=>{const n=new Set();if(combo.base)n.add(combo.base);combo.ids.forEach(id=>n.add(id));setSelected(n);setStep(5);};
  const handleSave=()=>{
    if(!saveName.trim()||selected.size<2)return;
    const composition={bases:[],verdures:[],legumes_crus:[],legumes_cuits:[],marines_pickles:[],fromages:[],herbes_fraiches:[],proteines:[],toppings:[],sauces:[]};
    selected.forEach(id=>{for(const[cat,items]of Object.entries(SALAD_INGREDIENTS)){if(items.some(i=>i.id===id)){composition[cat].push(id);break;}}});
    const hasBatch=[...selected].some(id=>salIng(id).batch);
    const newSalad={id:"custom_"+Date.now(),nom:saveName.trim(),cuisine:"Best Seller",saison:saveSaison,temps:12,batch:hasBatch?"Partiel":"Non",composition,recette:salGenRecipe(selected),custom:true};
    onSave(newSalad);setShowSave(false);onBack();
  };
  return(<div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <button onClick={onBack} style={{background:"#f3f4f6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>←</button>
      <h2 style={{margin:0,fontSize:17,fontWeight:800,color:C.forest}}>Composer ma salade</h2>
    </div>
    <div style={{display:"flex",gap:3,marginBottom:14}}>
      {steps.map(s=><button key={s.num} onClick={()=>setStep(s.num)} style={{flex:1,height:5,borderRadius:3,border:"none",cursor:"pointer",background:s.num<=step?C.fL:"#e5e7eb"}}/>)}
    </div>
    {step===1&&selected.size===0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>💡 Suggestions rapides</div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {SALAD_COMBOS.map(c=><button key={c.nom} onClick={()=>applyCombo(c)} style={{flexShrink:0,padding:"7px 12px",borderRadius:10,border:"1.5px solid "+C.fL+"30",background:C.fL+"06",cursor:"pointer",textAlign:"left",minWidth:120}}>
          <div style={{fontSize:12,fontWeight:700,color:C.forest}}>{c.nom}</div>
          <div style={{fontSize:10,color:"#6b7280",marginTop:1}}>{c.desc}</div>
        </button>)}
      </div>
    </div>}
    <div style={{background:"#f9fafb",borderRadius:12,padding:10,marginBottom:10}}>
      <div style={{fontSize:14,fontWeight:700,color:C.forest}}>{"Étape "+cur.num+" — "+cur.title}</div>
      <div style={{fontSize:11,color:"#6b7280"}}>{cur.sub}</div>
    </div>
    {cur.cats.map(catKey=><div key={catKey} style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>{SALAD_CATEGORIES[catKey].emoji+" "+SALAD_CATEGORIES[catKey].label}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {(SALAD_INGREDIENTS[catKey]||[]).map(i=><SalChip key={i.id} ingredient={i} selected={selected.has(i.id)} onClick={()=>toggle(i.id)}/>)}
      </div>
    </div>)}
    <div style={{position:"sticky",bottom:0,background:"#fff",borderTop:"1px solid #e5e7eb",padding:"10px 0 4px",marginTop:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:700,color:C.forest}}>{selected.size+" ingr. · ~"+cal+" kcal · "+prot+"g prot"}</span>
        <div style={{display:"flex",gap:1}}>{[...selected].slice(0,8).map(id=><span key={id} style={{fontSize:13}}>{salIng(id).emoji}</span>)}</div>
      </div>
      <div style={{display:"flex",gap:6}}>
        {step>1&&<button onClick={()=>setStep(s=>s-1)} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #d1d5db",background:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>←</button>}
        {step<5?
          <button onClick={()=>setStep(s=>s+1)} style={{flex:1,padding:"9px",borderRadius:10,background:C.fL,color:"#fff",border:"none",fontSize:12,fontWeight:700,cursor:"pointer"}}>Suivant →</button>:
          <button onClick={()=>selected.size>=2&&setShowSave(true)} style={{flex:1,padding:"9px",borderRadius:10,border:"none",background:selected.size>=2?C.forest:"#d1d5db",color:selected.size>=2?"#fff":"#9ca3af",fontSize:12,fontWeight:700,cursor:selected.size>=2?"pointer":"default"}}>{"🥗 Enregistrer ("+selected.size+" ingr.)"}</button>}
      </div>
    </div>
    {showSave&&<div style={{position:"fixed",inset:0,zIndex:1000,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowSave(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,width:"85%",maxWidth:360}}>
        <h3 style={{margin:"0 0 12px",fontSize:16,fontWeight:800,color:C.forest}}>🥗 Enregistrer ma salade</h3>
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,fontWeight:600,color:"#6b7280"}}>Nom de la salade</label>
          <input value={saveName} onChange={e=>setSaveName(e.target.value)} placeholder="Ma super salade..." autoFocus={true}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,marginTop:4,boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,fontWeight:600,color:"#6b7280"}}>Saison</label>
          <select value={saveSaison} onChange={e=>setSaveSaison(e.target.value)}
            style={{width:"100%",padding:"8px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13,marginTop:4}}>
            {["Été","Automne","Hiver","Printemps","Toutes saisons"].map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>
          Type : <strong style={{color:C.gold}}>⭐ Best Seller</strong>{" · "+selected.size+" ingrédients · ~"+cal+" kcal"}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowSave(false)} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid #d1d5db",background:"#fff",fontSize:13,cursor:"pointer"}}>Annuler</button>
          <button onClick={handleSave} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:saveName.trim()?C.forest:"#d1d5db",color:saveName.trim()?"#fff":"#9ca3af",fontSize:13,fontWeight:700,cursor:saveName.trim()?"pointer":"default"}}>✓ Enregistrer</button>
        </div>
      </div>
    </div>}
  </div>);
}

function SaladeTab({ratings,photos,customSalads,deletedIds,activeProfiles,bestsellerIds,menu,setMenu,onRate,onPhoto,onCustom,onDel,onProf,onBs}){
  const [view,setView]=useState("library");
  const [selectedSalad,setSelectedSalad]=useState(null);
  const [search,setSearch]=useState("");
  const [filterCuisine,setFilterCuisine]=useState("all");
  const [filterSaison,setFilterSaison]=useState("all");
  const [filterMinStars,setFilterMinStars]=useState(0);

  // IDs des salades déjà dans le menu (pour masquer le bouton "Ajouter")
  const menuSaladIds=React.useMemo(()=>(menu?.salades||[]).map(s=>s.id),[menu]);

  // Handler : ajouter une salade au menu pour un jour donné
  const addSaladToMenu=React.useCallback((salad,jourIdx)=>{
    const base=menu&&menu.repas?menu:{repas:[],entrees:[],salades:[],at:new Date().toISOString(),startDate:new Date().toISOString()};
    const wd=getWeekDays(base.startDate?new Date(base.startDate):new Date());
    const built=buildSaladForMenu(salad);
    const entry={...built,jour:wd[jourIdx%7].full,jourShort:wd[jourIdx%7].name,jourIdx:jourIdx%7,jourDate:wd[jourIdx%7].dateStr};
    const salades=[...(base.salades||[]),entry];
    setMenu({...base,salades});
  },[menu,setMenu]);

  const allSalads=React.useMemo(()=>{
    return[...BASE_SALADES,...customSalads].filter(s=>!deletedIds.includes(s.id))
      .map(s=>bestsellerIds.includes(s.id)?{...s,cuisine:"Best Seller"}:s);
  },[customSalads,deletedIds,bestsellerIds]);

  const cuisines=React.useMemo(()=>{
    const set=new Set(allSalads.map(s=>s.cuisine));set.add("Best Seller");
    return["Best Seller","Française","Méditerranéenne","Asiatique","Orientale","Autres"].filter(c=>set.has(c));
  },[allSalads]);

  const filtered=React.useMemo(()=>allSalads.filter(s=>{
    if(search&&!s.nom.toLowerCase().includes(search.toLowerCase()))return false;
    if(filterCuisine!=="all"&&s.cuisine!==filterCuisine)return false;
    if(filterSaison!=="all"&&s.saison!==filterSaison)return false;
    if(filterMinStars>0&&(ratings[s.id]||0)<filterMinStars)return false;
    return true;
  }),[allSalads,search,filterCuisine,filterSaison,filterMinStars,ratings]);

  const toggleProfile=key=>onProf(activeProfiles.includes(key)?activeProfiles.filter(k=>k!==key):[...activeProfiles,key]);
  const handleDelete=id=>{if(!confirm("Supprimer cette salade ?"))return;onDel([...deletedIds,id]);setSelectedSalad(null);setView("library");};
  const handleToggleBestSeller=id=>{
    const next=bestsellerIds.includes(id)?bestsellerIds.filter(x=>x!==id):[...bestsellerIds,id];
    onBs(next);
    setSelectedSalad(prev=>{if(!prev||prev.id!==id)return prev;
      const isBs=bestsellerIds.includes(id);
      return{...prev,cuisine:isBs?(BASE_SALADES.find(s=>s.id===id)?.cuisine||prev.cuisine):"Best Seller"};
    });
  };
  const handleSaveCustom=salad=>onCustom([...customSalads,salad]);

  if(view==="composer"){
    return(<div style={{maxWidth:480,margin:"0 auto",padding:"14px 14px 80px"}}>
      <SalComposer onBack={()=>setView("library")} onSave={handleSaveCustom}/>
    </div>);
  }

  return(<div style={{maxWidth:480,margin:"0 auto",padding:"14px 14px 80px"}}>
    <h1 style={{margin:"0 0 2px",fontSize:22,fontWeight:900,color:C.forest}}>🥗 Eat Salade Maison</h1>
    <p style={{margin:"0 0 12px",fontSize:12,color:"#6b7280"}}>{allSalads.length+" salades · Repas du midi"}</p>
    <div style={{marginBottom:12,display:"flex",gap:6}}>
      {Object.entries(SALAD_PROFILES).map(([key,p])=>{
        const active=activeProfiles.includes(key);
        return(<button key={key} onClick={()=>toggleProfile(key)} style={{padding:"5px 10px",borderRadius:20,border:"none",
          background:active?p.color+"18":"#f3f4f6",color:active?p.color:"#9ca3af",
          fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s",outline:active?"2px solid "+p.color+"40":"none"}}>
          {p.emoji+" "+p.nom}</button>);
      })}
    </div>
    <button onClick={()=>setView("composer")} style={{width:"100%",padding:"12px 14px",borderRadius:12,
      border:"2px dashed "+C.fL+"40",background:C.fL+"06",cursor:"pointer",textAlign:"left",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
      <span style={{width:38,height:38,borderRadius:10,background:C.fL+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>✨</span>
      <div>
        <div style={{fontSize:14,fontWeight:700,color:C.forest}}>Composer ma salade</div>
        <div style={{fontSize:11,color:"#6b7280"}}>Étape par étape → enregistrer en Best Seller</div>
      </div>
      <span style={{marginLeft:"auto",fontSize:16,color:C.fL}}>→</span>
    </button>
    <input type="text" placeholder="🔍 Rechercher..." value={search} onChange={e=>setSearch(e.target.value)}
      style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1.5px solid #e5e7eb",fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
    <div style={{display:"flex",gap:5,marginBottom:8,overflowX:"auto",paddingBottom:2}}>
      <SalFilterPill active={filterCuisine==="all"} onClick={()=>setFilterCuisine("all")}>Toutes</SalFilterPill>
      {cuisines.map(c=><SalFilterPill key={c} active={filterCuisine===c} onClick={()=>setFilterCuisine(c)} color={SALAD_CUISINE_COLORS[c]}>{c}</SalFilterPill>)}
    </div>
    <div style={{display:"flex",gap:5,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
      <SalFilterPill active={filterSaison==="all"} onClick={()=>setFilterSaison("all")}>🌍 Toutes</SalFilterPill>
      <SalFilterPill active={filterSaison==="Été"} onClick={()=>setFilterSaison("Été")}>☀️ Été</SalFilterPill>
      <SalFilterPill active={filterSaison==="Automne"} onClick={()=>setFilterSaison("Automne")}>🍂 Automne</SalFilterPill>
      <SalFilterPill active={filterSaison==="Hiver"} onClick={()=>setFilterSaison("Hiver")}>❄️ Hiver</SalFilterPill>
      <SalFilterPill active={filterSaison==="Printemps"} onClick={()=>setFilterSaison("Printemps")}>🌸 Print.</SalFilterPill>
      <select value={filterMinStars} onChange={e=>setFilterMinStars(Number(e.target.value))}
        style={{marginLeft:"auto",padding:"5px 8px",borderRadius:8,
          border:filterMinStars>0?"1.5px solid #F59E0B":"1.5px solid #e5e7eb",
          background:filterMinStars>0?"#FFFBEB":"#fff",fontSize:12,fontWeight:600,
          color:filterMinStars>0?"#B45309":"#6b7280",cursor:"pointer",outline:"none"}}>
        <option value={0}>⭐ Note</option>
        <option value={1}>≥ 1 ★</option>
        <option value={2}>≥ 2 ★★</option>
        <option value={3}>≥ 3 ★★★</option>
        <option value={4}>≥ 4 ★★★★</option>
        <option value={5}>5 ★★★★★</option>
      </select>
    </div>
    <div style={{fontSize:11,color:"#9ca3af",marginBottom:8,fontWeight:600}}>{filtered.length+" salade"+(filtered.length>1?"s":"")}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {filtered.map(s=><SalCard key={s.id} salad={s} rating={ratings[s.id]||0} photo={photos[s.id]}
        activeProfiles={activeProfiles} onClick={()=>{setSelectedSalad(s);setView("detail");}}/>)}
    </div>
    {filtered.length===0&&<div style={{textAlign:"center",padding:32,color:"#9ca3af"}}>
      <div style={{fontSize:36,marginBottom:6}}>🥬</div>
      <div style={{fontSize:13}}>Aucune salade trouvée</div>
    </div>}
    {view==="detail"&&selectedSalad&&(()=>{
      const liveSalad=allSalads.find(s=>s.id===selectedSalad.id)||selectedSalad;
      return(<SalDetail salad={liveSalad} rating={ratings[liveSalad.id]||0} photo={photos[liveSalad.id]}
        activeProfiles={activeProfiles} menu={menu} onAddToMenu={addSaladToMenu} menuSaladIds={menuSaladIds}
        onClose={()=>{setView("library");setSelectedSalad(null);}}
        onRate={n=>onRate(liveSalad.id,n)} onPhotoChange={url=>onPhoto(liveSalad.id,url)}
        onDelete={()=>handleDelete(liveSalad.id)} onToggleBestSeller={()=>handleToggleBestSeller(liveSalad.id)}/>);
    })()}
  </div>);
}

// ═══════ LOCK DIALOG (Synthèse + PDF) ═══════
function LockDialog({menu:rawMenu,profiles,onClose}){
  if(!rawMenu)return null;
  const menu={...rawMenu,repas:rawMenu.repas||[],entrees:rawMenu.entrees||[],salades:rawMenu.salades||[]};
  const [generating,setGenerating]=useState(false);
  const pdfRef=React.useRef(null);
  const batch=menu.repas.filter(r=>r.batch==="Oui"||r.batch==="Partiel");
  const jour=menu.repas.filter(r=>r.batch==="Non");
  const batchDay=(()=>{try{const d=new Date(menu.startDate||menu.at);const j=d.toLocaleDateString('fr-FR',{weekday:'long'});return j.charAt(0).toUpperCase()+j.slice(1);}catch(e){return"Dimanche";}})();

  function generateText(){
    let t="🌿 LA TABLE FAMILIALE\nSemaine du "+new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})+"\n\n";
    t+="══ MENU ══\n";
    menu.repas.forEach(p=>{t+=(p.jour||p.jourDate||"")+": "+p.nom+(p.batch!=="Non"?" [BATCH]":"")+"\n";});
    if(menu.entrees.length){t+="\n══ ENTRÉES ══\n";menu.entrees.forEach(e=>{t+="• "+e.nom+"\n";});}
    if((menu.salades||[]).length){t+="\n══ SALADES MIDI ══\n";menu.salades.forEach(s=>{t+=(s.jour||s.jourDate||"")+": "+s.nom+(s.batch!=="Non"?" [BATCH]":"")+"\n";});}
    t+="\n══ BATCH "+batchDay.toUpperCase()+" ══\n";
    batch.forEach(p=>{
      const steps=(p.recette||"").split(/(?=\d+\.)/).filter(s=>s.toLowerCase().includes("batch")).map(s=>s.trim()).join(" ");
      t+="• "+p.nom+": "+(steps||"voir recette")+"\n";
    });
    if(jour.length){t+="\n══ JOUR MÊME ══\n";jour.forEach(p=>{t+=(p.jour||"")+": "+p.nom+" ("+p.temps_prepa+"min)\n";});}
    return t;
  }

  function copyText(){
    const t=generateText();
    if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>alert("Synthèse copiée !"));}
    else{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copiée !");}
  }

  function downloadPDF(){
    if(!pdfRef.current||!window.html2pdf)return;
    setGenerating(true);
    const opt={
      margin:[10,10,10,10],
      filename:"la-table-familiale-semaine.pdf",
      image:{type:"jpeg",quality:0.95},
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
    };
    html2pdf().set(opt).from(pdfRef.current).save().then(()=>setGenerating(false)).catch(()=>setGenerating(false));
  }

  const dateStr=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,
        width:"100%",maxWidth:440,maxHeight:"85vh",overflowY:"auto"}}>
        <h3 style={{margin:"0 0 12px",fontSize:16,fontWeight:700,color:C.forest,textAlign:"center"}}>🔒 Menu verrouillé !</h3>

        {/* PDF content (rendered but used for export) */}
        <div ref={pdfRef} style={{background:"#fff",padding:16,fontSize:11,lineHeight:1.7}}>
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:800,color:"#1A3A0A"}}>🌿 La Table Familiale</div>
            <div style={{fontSize:12,color:"#4A4A4A"}}>Semaine du {dateStr}</div>
            <div style={{fontSize:10,color:"#7A7A7A"}}>Pour {profiles.join(", ")}</div>
          </div>

          <div style={{borderTop:"2px solid #2D6B0E",paddingTop:8,marginBottom:10}}>
            <div style={{fontWeight:700,color:"#1A3A0A",fontSize:12,marginBottom:6}}>📋 MENU DE LA SEMAINE</div>
            {menu.repas.map(p=>(<div key={p.id} style={{padding:"3px 0",borderBottom:"1px solid #F0EDE5"}}>
              <strong style={{color:"#2D6B0E"}}>{p.jourDate||p.jour}</strong>: {p.nom}
              {p.batch!=="Non"&&<span style={{color:"#B8860B",fontSize:10}}> [{p.batch}]</span>}
            </div>))}
          </div>

          {menu.entrees.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#B8860B",fontSize:12,marginBottom:4}}>🥕 ENTRÉES (pool libre)</div>
            {menu.entrees.map(e=><div key={e.id}>• {e.nom} ({e.genre}, {e.temps_prepa}min)</div>)}
          </div>}

          {(menu.salades||[]).length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#2D6B0E",fontSize:12,marginBottom:4}}>🥗 SALADES MIDI</div>
            {(menu.salades||[]).map(s=><div key={s.id} style={{padding:"3px 0",borderBottom:"1px solid #F0EDE5"}}>
              <strong style={{color:"#2D6B0E"}}>{s.jourDate||s.jour}</strong>: {s.nom}
              {s.batch!=="Non"&&<span style={{color:"#B8860B",fontSize:10}}> [{s.batch}]</span>}
            </div>)}
          </div>}

          {batch.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#B8860B",fontSize:12,marginBottom:4}}>👨‍🍳 BATCH COOKING — {batchDay}</div>
            {batch.map(p=>{
              const steps=(p.recette||"").split(/(?=\d+\.)/).filter(s=>s.toLowerCase().includes("batch")).map(s=>s.trim());
              return(<div key={p.id} style={{marginBottom:4}}>
                <strong>{p.nom}</strong> ({p.temps_batch!=="—"?p.temps_batch+"min":""})<br/>
                {steps.length>0&&<span style={{color:"#B8860B"}}>{steps[0]}</span>}
              </div>);
            })}
            <div style={{marginTop:6,padding:6,background:"#FFF3F0",borderRadius:4,fontSize:10,color:"#C62828"}}>
              ⚠️ Riz = cuire au dernier moment · Viande = marinade uniquement, NE PAS cuire
            </div>
          </div>}

          {jour.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#4A4A4A",fontSize:12,marginBottom:4}}>🔵 JOUR MÊME</div>
            {jour.map(p=><div key={p.id}>{p.jourDate||p.jour}: {p.nom} ({p.temps_prepa}min)</div>)}
          </div>}
        </div>

        {/* Action buttons */}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={downloadPDF} disabled={generating} style={{flex:1,padding:12,borderRadius:10,border:"none",
            background:`linear-gradient(135deg,${C.forest},${C.fL})`,color:"#fff",fontSize:13,fontWeight:700,
            cursor:generating?"wait":"pointer",opacity:generating?.6:1}}>
            {generating?"⏳ Génération...":"📄 Télécharger PDF"}</button>
          <button onClick={copyText} style={{padding:"12px 14px",borderRadius:10,border:`1px solid ${C.bdr}`,
            background:"#fff",fontSize:13,cursor:"pointer"}}>📋</button>
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:8,padding:10,borderRadius:10,
          border:`1px solid ${C.bdr}`,background:"#fff",fontSize:13,cursor:"pointer",color:C.tM}}>Fermer</button>
      </div>
    </div>
  );
}

    justifyContent:"center",height:"100vh",background:"#F7F5EF"}}>
    <div style={{fontSize:48}}>🌿</div>

  <script>
    // ═══════ PUSH NOTIFICATIONS ═══════
    const VAPID_PUBLIC_KEY = "BFgBKohslpgTxYPnWwLSqD3lSjeCrzLAUawh-wiWUXoDJ0qkeKaXRPY5An0SGUtxsTwnVUT5dOY2rxuoaBU7esY";

    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    async function subscribePush(reg) {
      try {
        const existing = await reg.pushManager.getSubscription();
        if (existing) { savePushSubscription(existing); return; }
        const permission = await Notification.requestPermission();
        if (permission !== "granted") { console.log("🔕 Notifications refusées"); return; }
        const subscription = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        savePushSubscription(subscription);
        console.log("🔔 Push subscription active");
      } catch (err) { console.warn("Push subscribe error:", err); }
    }

    function savePushSubscription(subscription) {
      if (!window._fb) return;
      const sub = subscription.toJSON();
      const key = btoa(sub.endpoint).replace(/[.#$/\[\]]/g, "_").slice(-40);
      window._fb.ref("push_subscriptions/" + key).set(sub);
      console.log("💾 Subscription sauvegardée dans Firebase");
    }

    // Expose globally for the in-app button
    window._pushSubscribe = null;
    window._pushStatus = "loading";

    async function checkAndSubscribe(reg) {
      window._swReg = reg;
      try {
        const existing = await reg.pushManager.getSubscription();
        if (existing) {
          savePushSubscription(existing);
          window._pushStatus = "subscribed";
          return;
        }
      } catch(e) {}
      // On iOS, permission must be triggered by user gesture
      // So we just mark as "ready" and let the button handle it
      if (Notification.permission === "granted") {
        subscribePush(reg);
      } else {
        window._pushStatus = "ready";
      }
    }

    window._pushSubscribe = async function() {
      if (!window._swReg) return "no-sw";
      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") return "denied";
        const subscription = await window._swReg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        savePushSubscription(subscription);
        window._pushStatus = "subscribed";
        return "ok";
      } catch (err) {
        console.warn("Push subscribe error:", err);
        return "error";
      }
    };

    // Register SW
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").then(reg => {
        console.log("📱 Service Worker enregistré");
        if (reg.active) {
          checkAndSubscribe(reg);
        } else {
          reg.addEventListener("updatefound", () => {
            const nw = reg.installing;
            if (nw) nw.addEventListener("statechange", () => {
              if (nw.state === "activated") checkAndSubscribe(reg);
            });
          });
        }
      }).catch(err => console.warn("SW error:", err));
    }
  </script>
