// ── STORAGE (Firebase Realtime DB + localStorage fallback) ──
function sGet(k,fb){
  try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}
}
function sSet(k,v){
  try{
    localStorage.setItem(k,JSON.stringify(v));
    // Sync to Firebase
    if(window._fb){window._fb.ref(k).set(v).catch(e=>console.warn("Firebase write error:",e));}
  }catch(e){console.error(e);}
}
// Listen for Firebase changes (sync from other devices)
function fbListen(k,callback){
  if(!window._fb)return;
  window._fb.ref(k).on("value",snap=>{
    const val=snap.val();
    if(val!==null&&val!==undefined){
      localStorage.setItem(k,JSON.stringify(val));
      callback(val);
    }
  });
}

const JOURS_ALL=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
function getWeekDays(startDate){
  const d=startDate||new Date();
  const days=[];
  for(let i=0;i<7;i++){
    const day=new Date(d);day.setDate(d.getDate()+i);
    const name=JOURS_ALL[day.getDay()];
    const dateStr=day.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
    const capDate=dateStr.charAt(0).toUpperCase()+dateStr.slice(1);
    days.push({name,dateStr:name+" "+capDate,full:name+" "+capDate});
  }
  return days;
}

    fbListen("ltf2_crs",setCourseCk);
    fbListen("ltf2_photos",setPhotos);
    fbListen("ltf2_sord",setStockOrder);

// ═══════ TAB 1 — MENU ═══════
function MenuTab({menu,setMenu,locked,profiles,setProfiles,ratings,photos,onSel}){
  const [nbR,setNbR]=useState(menu?.repas?.length||7);
  const [nbE,setNbE]=useState(menu?.entrees?.length||2);
  const [saison,setSaison]=useState("Toutes saisons");
  const [noteF,setNoteF]=useState(0);
  const [confirm,setConfirm]=useState(false);
  const [replIdx,setReplIdx]=useState(null);

  const filtered=useMemo(()=>DATA.plats.filter(p=>{
    if(saison==="Toutes saisons") return true;
    if(saison==="Printemps") return p.saison==="Toutes saisons"||p.saison==="Été";
    return p.saison==="Toutes saisons"||p.saison===saison;
  }).filter(p=>noteF===0||(ratings[p.id]||0)>=noteF),[saison,noteF,ratings]);

  const filteredE=useMemo(()=>DATA.entrees.filter(e=>{
    if(saison==="Toutes saisons") return true;
    if(saison==="Printemps") return e.saison==="Toutes saisons"||e.saison==="Été";
    return e.saison==="Toutes saisons"||e.saison===saison;
  }),[saison]);

  function generate(){
    if(menu&&!confirm){setConfirm(true);return;}
    setConfirm(false);
    const sh=[...filtered].sort(()=>Math.random()-.5).slice(0,nbR);
    const bo={Oui:0,Partiel:1,Non:2};
    sh.sort((a,b)=>(bo[a.batch]??1)-(bo[b.batch]??1));
    const weekDays=getWeekDays(new Date());
    const repas=sh.map((p,i)=>({...p,jour:weekDays[i%7].full,jourShort:weekDays[i%7].name,jourIdx:i%7,jourDate:weekDays[i%7].dateStr}));
    const ent=[...filteredE].sort(()=>Math.random()-.5).slice(0,nbE);
    setMenu({repas,entrees:ent,at:new Date().toISOString(),startDate:new Date().toISOString()});
  }
  function removeR(idx){if(locked)return;
    const wd=getWeekDays(menu.startDate?new Date(menu.startDate):new Date());
    const r=menu.repas.filter((_,i)=>i!==idx).map((r,i)=>({...r,jour:wd[i%7].full,jourShort:wd[i%7].name,jourIdx:i%7,jourDate:wd[i%7].dateStr}));
    setMenu({...menu,repas:r});}
  function replaceR(idx,type){if(locked)return;
    const cands=filtered.filter(p=>p.type===type&&!menu.repas.some(r=>r.id===p.id));
    if(!cands.length)return;
    const r=[...menu.repas];r[idx]={...cands[Math.floor(Math.random()*cands.length)],jour:r[idx].jour,jourShort:r[idx].jourShort,jourIdx:r[idx].jourIdx,jourDate:r[idx].jourDate};
    setMenu({...menu,repas:r});setReplIdx(null);}
  function toggleProf(name){
    const n=profiles.includes(name)?profiles.filter(p=>p!==name):[...profiles,name];
    if(!n.length)return;setProfiles(n);}

  return (
    <div style={{padding:14}}>
      <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${C.bdr}`}}>
        <h2 style={{margin:"0 0 12px",fontSize:16,fontWeight:700,color:C.forest}}>Générer le menu</h2>
        <div style={{display:"flex",gap:6,marginBottom:12,justifyContent:"center"}}>
          {["Damien","Maroie","Maël"].map(n=>(
            <button key={n} onClick={()=>toggleProf(n)} style={{padding:"5px 12px",borderRadius:18,fontSize:12,
              cursor:"pointer",border:`2px solid ${PC[n]}`,fontWeight:600,
              background:profiles.includes(n)?PC[n]:"transparent",
              color:profiles.includes(n)?"#fff":PC[n]}}>{n}</button>
          ))}
        </div>

// ═══════ TAB 3 — COURSES ═══════
function CoursesTab({menu,profiles,stockCk,courseCk,setCk,stockOrder}){
  const grouped=useMemo(()=>{
    if(!menu)return[];
    const all=[...(menu.repas||[]),...(menu.entrees||[])];
    const map={};
    all.forEach(plat=>{(plat.ingredients||[]).forEach(([nom,unite,qD,qM,qE])=>{
      const k=nom+"__"+unite;
      if(!map[k])map[k]={nom,unite,qD:0,qM:0,qE:0,cat:IC[nom]||"DIVERS"};
      map[k].qD+=(qD||0);map[k].qM+=(qM||0);map[k].qE+=(qE||0);
    });});
    const items=Object.values(map).map(it=>{
      let tot=0;
      if(profiles.includes("Damien"))tot+=it.qD;
      if(profiles.includes("Maroie"))tot+=it.qM;
      if(profiles.includes("Maël"))tot+=it.qE;
      return{...it,tot};
    }).filter(i=>i.tot>0);
    const early=new Set(),late=new Set();
    (menu.repas||[]).forEach(r=>{(r.ingredients||[]).forEach(([n])=>{if(r.jourIdx<3)early.add(n);else late.add(n);});});
    const freshOnly=new Set([...late].filter(n=>!early.has(n)));
    const result=[];
    CAT_ORDER.forEach(([ck,emoji])=>{
      const ciRaw=items.filter(i=>i.cat===ck);
      // Sort by stock order if available, else alphabetical
      const catFullName=CN[ck]||ck;
      const order=stockOrder&&stockOrder[catFullName];
      const ci=order?ciRaw.sort((a,b)=>{const ia=order.indexOf(a.nom);const ib=order.indexOf(b.nom);
        if(ia===-1&&ib===-1)return a.nom.localeCompare(b.nom,"fr");if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;}):
        ciRaw.sort((a,b)=>a.nom.localeCompare(b.nom,"fr"));
      const si=[];
      const sc=DATA.stock.find(c=>c.nom===(CN[ck]||ck));
      if(sc)sc.articles.forEach(art=>{if(stockCk[sc.nom+"__"+art.nom])
        if(!ci.some(i=>i.nom.toLowerCase().includes(art.nom.toLowerCase())||art.nom.toLowerCase().includes(i.nom.toLowerCase())))
          si.push({nom:art.nom,unite:"",tot:null,isStock:true,cat:ck});});
      const combined=[...ci,...si];
      if(combined.length)result.push({key:ck,name:CN[ck]||ck,emoji,items:combined,freshOnly});
    });
    return result;
  },[menu,profiles,stockCk]);

  const total=grouped.reduce((s,g)=>s+g.items.length,0);
  const checked=Object.values(courseCk).filter(Boolean).length;
  if(!menu)return<div style={{padding:20,textAlign:"center",color:C.tL}}><span style={{fontSize:40}}>🛒</span><p>Générez un menu.</p></div>;
  return(<div style={{padding:14,maxWidth:600,margin:"0 auto",textAlign:"center"}}>
    <div style={{background:"#fff",padding:"10px 14px",borderRadius:10,marginBottom:10,border:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{textAlign:"center",flex:1}}><h2 style={{margin:0,fontSize:15,fontWeight:700,color:C.forest}}>🛒 Courses</h2>
        <p style={{margin:"1px 0 0",fontSize:10,color:C.tL}}>Pour {profiles.join(", ")} · Ordre Intermarché</p></div>
      <span style={{padding:"4px 10px",borderRadius:16,fontSize:12,fontWeight:700,
        background:checked===total&&total?C.okBg:C.bg,color:checked===total&&total?C.ok:C.tM}}>{checked}/{total}</span>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:12,padding:"6px 10px",background:"#fff",borderRadius:8,border:`1px solid ${C.bdrL}`,fontSize:10}}>
      <span>🧊 = Jeu/Ven</span><span>📦 = Stock</span></div>
    {grouped.map(({key,name,emoji,items,freshOnly})=>(
      <div key={key} style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,padding:"5px 10px",background:C.forest+"0A",borderRadius:8}}>
          <span style={{fontSize:16}}>{emoji}</span><span style={{fontSize:12,fontWeight:700,color:C.forest}}>{name}</span>
          <span style={{fontSize:10,color:C.tL,marginLeft:"auto"}}>{items.length}</span></div>
        {items.map(item=>{const k=item.isStock?`stk__${name}__${item.nom}`:`ing__${item.nom}__${item.unite}`;
          const ck=courseCk[k];const isFO=freshOnly?.has(item.nom)&&!item.isStock;
          return(<div key={k} onClick={()=>{const n={...courseCk,[k]:!ck};setCk(n);}}
            style={{background:ck?C.okBg:"#fff",padding:"8px 10px",borderRadius:7,border:`1px solid ${ck?C.ok+"33":C.bdrL}`,
              marginBottom:2,display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <div style={{width:18,height:18,borderRadius:4,flexShrink:0,border:`2px solid ${ck?C.ok:C.bdr}`,
              background:ck?C.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {ck&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div>
            <span style={{flex:1,fontSize:12,fontWeight:500,textDecoration:ck?"line-through":"none",color:ck?C.tL:C.text}}>{item.nom}</span>
            {item.tot!=null&&<span style={{fontSize:12,fontWeight:700,color:C.fL,whiteSpace:"nowrap"}}>{fmtQ(item.tot,item.unite)}</span>}
            {item.isStock&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:5,background:C.gold+"20",color:C.gold,fontWeight:700}}>📦</span>}
            {isFO&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:5,background:"#E3F2FD",color:C.blue,fontWeight:700}}>🧊</span>}
          </div>);})}
      </div>
    ))}
    {total>0&&<div style={{marginTop:6,padding:"10px 12px",background:"#fff",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:11,color:C.tM}}>
      <strong>{grouped.length}</strong> rayons · <strong>{total}</strong> articles</div>}
  </div>);
}
function fmtQ(v,u){if(v==null)return"—";const r=Math.round(v*10)/10;const d=Number.isInteger(r)?r:r.toFixed(1);return u&&u!=="—"?`${d} ${u}`:`${d}`;}

// ═══════ TAB 4 — BATCH (enrichi avec détails + stratégie) ═══════
function BatchTab({menu}){
  const [openId,setOpenId]=useState(null);
  if(!menu)return<div style={{padding:20,textAlign:"center",color:C.tL}}><span style={{fontSize:40}}>👨‍🍳</span><p>Générez un menu.</p></div>;

  const batch=menu.repas.filter(r=>r.batch==="Oui"||r.batch==="Partiel");
  const jour=menu.repas.filter(r=>r.batch==="Non");
  const hasRiz=p=>p.ingredients?.some(i=>i[0]?.toLowerCase().includes("riz"));

  // Extract batch steps from recipe
  function getBatchSteps(recette){
    if(!recette)return{batch:[],jourMeme:[]};
    const steps=recette.split(/(?=\d+\.)/).filter(s=>s.trim());
    const batchSteps=steps.filter(s=>s.toLowerCase().includes("batch"));
    const jourSteps=steps.filter(s=>!s.toLowerCase().includes("batch"));
    return{batch:batchSteps,jourMeme:jourSteps};
  }

  // Build strategy with proper batch rules
  function buildStrategy(batchPlats){
    const tasks={four:[],feculents:[],legumineuses:[],oeufs:new Set(),decoupe:[],marinades:[],sauces:[], cuisson_longue:[]};
    batchPlats.forEach(p=>{
      const r=(p.recette||"").toLowerCase();
      const ings=(p.ingredients||[]).map(i=>i[0].toLowerCase());
      const allIngs=ings.join(" ");
      const hasPoulet=ings.some(i=>i.includes("poulet"));
      const hasViande=ings.some(i=>i.includes("viande")||i.includes("merguez"));
      const hasRizP=ings.some(i=>i.includes("riz")&&!i.includes("arborio"));
      const isFour=r.includes("four")||["gratin","lasagne","quiche","tarte","pizza","cake"].some(x=>r.includes(x)||p.type.toLowerCase().includes(x));
      // Cuissons complètes au four (sauf si contient viande seule)
      if(isFour&&!hasPoulet) tasks.four.push({nom:p.nom,time:parseInt(p.temps_batch)||parseInt(p.temps_prepa)||20});
      // Marinades viande (on ne cuit PAS la viande)
      if(hasPoulet||hasViande) tasks.marinades.push({nom:p.nom,detail:hasPoulet?"Marinade poulet":"Marinade viande"});
      // Féculents (SAUF riz)
      const fecs=["pâtes","quinoa","boulgour","couscous"].filter(f=>allIngs.includes(f));
      if(fecs.length) tasks.feculents.push({nom:p.nom,fec:fecs.join(", "),time:parseInt(p.temps_batch)||15});
      // Légumineuses
      const legs=["lentilles","pois chiche","haricots"].filter(f=>allIngs.includes(f));
      if(legs.length&&!fecs.length) tasks.legumineuses.push({nom:p.nom,leg:legs.join(", ")});
      // Œufs durs/mollets
      if(r.includes("œufs durs")||r.includes("œufs mollets")||r.includes("œuf dur")||r.includes("œuf mollet")) tasks.oeufs.add("Œufs durs/mollets");
      // Découpe légumes
      const legDec=ings.filter(i=>["carotte","poivron","oignon","courgette","concombre","poireau","brocoli","champignon","chou","betterave","patate","aubergine","tomate"].some(l=>i.includes(l)));
      if(legDec.length>=2) tasks.decoupe.push({nom:p.nom,count:legDec.length});
      // Cuisson longue (>25min)
      const totalTime=parseInt(p.temps_prepa)||0;
      if(totalTime>25||parseInt(p.temps_batch)>30) tasks.cuisson_longue.push({nom:p.nom,time:totalTime});
    });
    return tasks;
  }
  const strategy=buildStrategy(batch);
  const totalBatchTime=batch.reduce((s,p)=>{const t=parseInt(p.temps_batch)||0;return s+t;},0);

  return(
    <div style={{padding:14,maxWidth:600,margin:"0 auto",textAlign:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${C.bdr}`}}>

          <span style={{fontSize:16}}>{ET[p.type]||"🍽"}</span>

// ═══════ TAB 5 — STOCK ═══════
function StockTab({stockCk,setStockCk,stockOrder,setStockOrder,customArt,setCustomArt}){
  const [search,setSearch]=useState("");
  const [catF,setCatF]=useState("all");
  const [dragCat,setDragCat]=useState(null);
  const [dragIdx,setDragIdx]=useState(null);
  const [dragOverIdx,setDragOverIdx]=useState(null);
  const touchStart=React.useRef(null);
  const [addingTo,setAddingTo]=useState(null);
  const [newArtName,setNewArtName]=useState("");
  const [renamingKey,setRenamingKey]=useState(null);
  const [renameVal,setRenameVal]=useState("");
  const nonAlim=["SANITAIRES","PRODUITS MÉNAGERS","DIVERS"];
  const ECat={"SUCRÉ":"🍫","SALÉ":"🧂","HUILES ET CONDIMENTS":"🫒","SANITAIRES":"🧴",
    "PRODUITS MÉNAGERS":"🧹","DIVERS":"📦","FRAIS":"🧀","FRAIS PROTÉINES":"🥩",
    "FRUITS":"🍎","FRUITS SECS":"🥜","LÉGUMES":"🥬","SURGELÉS":"❄️"};

  // Get ordered articles for a category
  function getOrdered(cat){
    // Base articles + custom added - custom deleted, with renames applied
    let names=cat.articles.map(a=>a.nom);
    // Add custom articles for this category
    if(customArt.add){customArt.add.forEach(a=>{if(a.cat===cat.nom&&!names.includes(a.nom))names.push(a.nom);});}
    // Remove deleted
    if(customArt.del){names=names.filter(n=>!customArt.del.includes(cat.nom+"__"+n));}
    // Apply renames
    if(customArt.ren){names=names.map(n=>customArt.ren[cat.nom+"__"+n]||n);}
    const order=stockOrder[cat.nom];
    if(!order)return names;
    const ordered=order.filter(n=>names.includes(n));
    const newItems=names.filter(n=>!order.includes(n));
    return [...ordered,...newItems];
  }

  function addArticle(catNom,nom){
    if(!nom.trim())return;
    const next={...customArt,add:[...(customArt.add||[]),{cat:catNom,nom:nom.trim()}]};
    setCustomArt(next);setNewArtName("");setAddingTo(null);
  }
  function deleteArticle(catNom,artNom){
    if(!confirm("Supprimer "+artNom+" ?"))return;
    const next={...customArt,del:[...(customArt.del||[]),catNom+"__"+artNom]};
    setCustomArt(next);
  }
  function renameArticle(catNom,oldName,newName){
    if(!newName.trim())return;
    const next={...customArt,ren:{...(customArt.ren||{}),[catNom+"__"+oldName]:newName.trim()}};
    setCustomArt(next);setRenamingKey(null);setRenameVal("");
  }

  function moveArticle(catNom,fromIdx,toIdx){
    if(fromIdx===toIdx)return;
    const cat=DATA.stock.find(c=>c.nom===catNom);
    if(!cat)return;
    const ordered=getOrdered(cat);
    const item=ordered[fromIdx];
    const next=[...ordered];
    next.splice(fromIdx,1);
    next.splice(toIdx,0,item);
    const newOrder={...stockOrder,[catNom]:next};
    setStockOrder(newOrder);
  }

  const filtered=useMemo(()=>{
    let cats=DATA.stock;
    if(catF!=="all")cats=cats.filter(c=>c.nom===catF);
    if(search.trim()){const q=search.toLowerCase();cats=cats.map(c=>({...c,articles:c.articles.filter(a=>a.nom.toLowerCase().includes(q))})).filter(c=>c.articles.length);}
    return cats;
  },[catF,search]);
  const ckCount=Object.values(stockCk).filter(Boolean).length;
  const isSearching=search.trim().length>0;

  return(<div style={{padding:14,maxWidth:600,margin:"0 auto",textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h2 style={{margin:0,fontSize:16,fontWeight:700,color:C.forest,textAlign:"center"}}>📦 Stock</h2>
      {ckCount>0&&<span style={{padding:"3px 8px",borderRadius:12,fontSize:11,fontWeight:600,background:C.gold+"15",color:C.gold}}>{ckCount} à racheter</span>}
    </div>
    <div style={{position:"relative",marginBottom:8}}>
      <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13}}>🔍</span>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Chercher..."
        style={{width:"100%",padding:"7px 10px 7px 30px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:12,background:"#fff",boxSizing:"border-box"}}/>
    </div>
    {!isSearching&&<p style={{fontSize:10,color:C.tL,marginBottom:8}}>↕️ Maintenez et glissez pour réordonner</p>}
    <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:6,marginBottom:10,justifyContent:"center",flexWrap:"wrap"}}>
      <Chip label="Tout" on={catF==="all"} click={()=>setCatF("all")}/>
      {DATA.stock.map(c=><Chip key={c.nom} label={`${ECat[c.nom]||""} ${c.nom}`} on={catF===c.nom} click={()=>setCatF(c.nom)}/>)}
    </div>
    {filtered.map(cat=>{
      const orderedNames=isSearching?cat.articles.map(a=>a.nom):getOrdered(cat);
      return(<div key={cat.nom} style={{marginBottom:14}}>
      <h3 style={{fontSize:12,fontWeight:700,color:C.forest,marginBottom:5,display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
        {ECat[cat.nom]||"📦"} {cat.nom} <span style={{fontSize:10,color:C.tL,fontWeight:400}}>({orderedNames.length})</span></h3>
      {nonAlim.includes(cat.nom)&&addingTo===cat.nom?
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          <input type="text" value={newArtName} onChange={e=>setNewArtName(e.target.value)}
            placeholder="Nom du nouvel article..." autoFocus
            style={{flex:1,padding:"6px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:12,boxSizing:"border-box"}}
            onKeyDown={e=>{if(e.key==="Enter")addArticle(cat.nom,newArtName);}}/>
          <button onClick={()=>addArticle(cat.nom,newArtName)} style={{padding:"6px 10px",borderRadius:6,
            background:C.fL,color:"#fff",border:"none",fontSize:11,cursor:"pointer"}}>OK</button>
          <button onClick={()=>{setAddingTo(null);setNewArtName("");}} style={{padding:"6px 8px",borderRadius:6,
            border:`1px solid ${C.bdr}`,background:"#fff",fontSize:11,cursor:"pointer"}}>X</button>
        </div>
      :nonAlim.includes(cat.nom)&&<button onClick={()=>setAddingTo(cat.nom)} style={{marginBottom:6,padding:"5px 10px",
        borderRadius:6,border:`1px dashed ${C.fL}`,background:"transparent",fontSize:11,cursor:"pointer",color:C.fL}}>
        + Ajouter un article</button>}
      {orderedNames.map((artNom,idx)=>{const k=cat.nom+"__"+artNom;const ck=stockCk[k];
        const isDragging=dragCat===cat.nom&&dragIdx===idx;
        const isDragOver=dragCat===cat.nom&&dragOverIdx===idx;
        return <div key={artNom}
          draggable={!isSearching}
          onDragStart={e=>{setDragCat(cat.nom);setDragIdx(idx);e.dataTransfer.effectAllowed="move";}}
          onDragOver={e=>{e.preventDefault();if(dragCat===cat.nom)setDragOverIdx(idx);}}
          onDragEnd={()=>{if(dragCat===cat.nom&&dragIdx!==null&&dragOverIdx!==null)moveArticle(cat.nom,dragIdx,dragOverIdx);
            setDragCat(null);setDragIdx(null);setDragOverIdx(null);}}
          onTouchStart={e=>{touchStart.current={cat:cat.nom,idx,y:e.touches[0].clientY};}}
          onTouchMove={e=>{
            if(!touchStart.current||touchStart.current.cat!==cat.nom)return;
            const touch=e.touches[0];
            const el=document.elementFromPoint(touch.clientX,touch.clientY);
            if(el){const row=el.closest("[data-didx]");
              if(row){const newIdx=parseInt(row.dataset.didx);
                if(!isNaN(newIdx)&&newIdx!==dragOverIdx){setDragCat(cat.nom);setDragIdx(touchStart.current.idx);setDragOverIdx(newIdx);}}}
          }}
          onTouchEnd={()=>{if(dragCat===cat.nom&&dragIdx!==null&&dragOverIdx!==null)moveArticle(cat.nom,dragIdx,dragOverIdx);
            touchStart.current=null;setDragCat(null);setDragIdx(null);setDragOverIdx(null);}}
          data-didx={idx}
          style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
            background:isDragOver?"#E8F5E9":isDragging?"#FFF8E1":ck?C.gold+"08":"#fff",
            borderRadius:6,cursor:isSearching?"pointer":"grab",
            border:`1px solid ${isDragOver?C.ok+"66":ck?C.gold+"33":C.bdrL}`,marginBottom:2,
            opacity:isDragging?.5:1,transition:"background .15s, border .15s",
            userSelect:"none",WebkitUserSelect:"none"}}>
          {!isSearching&&<span style={{fontSize:10,color:C.tL,cursor:"grab",padding:"2px",flexShrink:0}}>☰</span>}
          <div onClick={()=>{const n={...stockCk,[k]:!ck};setStockCk(n);}}
            style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${ck?C.gold:C.bdr}`,
              background:ck?C.gold:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {ck&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div>
            {renamingKey===cat.nom+"__"+artNom?
              <div style={{display:"flex",gap:4,flex:1}} onClick={e=>e.stopPropagation()}>
                <input type="text" value={renameVal} onChange={e=>setRenameVal(e.target.value)} autoFocus
                  style={{flex:1,padding:"3px 6px",borderRadius:4,border:`1px solid ${C.bdr}`,fontSize:11}}
                  onKeyDown={e=>{if(e.key==="Enter")renameArticle(cat.nom,artNom,renameVal);}}/>
                <button onClick={()=>renameArticle(cat.nom,artNom,renameVal)} style={{padding:"3px 6px",borderRadius:4,
                  background:C.fL,color:"#fff",border:"none",fontSize:10,cursor:"pointer"}}>OK</button>
                <button onClick={()=>setRenamingKey(null)} style={{padding:"3px 6px",borderRadius:4,
                  border:`1px solid ${C.bdr}`,background:"#fff",fontSize:10,cursor:"pointer"}}>X</button>
              </div>
            :<><span style={{fontSize:12,textAlign:"left",flex:1}}>{artNom}</span>
              {nonAlim.includes(cat.nom)&&<div style={{display:"flex",gap:2,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>{setRenamingKey(cat.nom+"__"+artNom);setRenameVal(artNom);}} style={{padding:"2px 5px",borderRadius:4,
                  border:`1px solid ${C.bdrL}`,background:"#fff",fontSize:9,cursor:"pointer",color:C.tL}}>✏️</button>
                <button onClick={()=>deleteArticle(cat.nom,artNom)} style={{padding:"2px 5px",borderRadius:4,
                  border:`1px solid ${C.danger}22`,background:C.dangerBg,fontSize:9,cursor:"pointer",color:C.danger}}>🗑</button>
              </div>}</>}
          </div>
        </div>;})}
    </div>);})}
  </div>);
}

// ═══════ PUSH NOTIFICATION BUTTON ═══════
function PushButton(){
  const [status,setStatus]=useState("checking");
  useEffect(()=>{
    const check=()=>{
      if(!("serviceWorker" in navigator)||!("PushManager" in window)){setStatus("unsupported");return;}
      if(Notification.permission==="denied"){setStatus("denied");return;}
      if(window._pushStatus==="subscribed"){setStatus("subscribed");return;}
      if(window._pushStatus==="ready"){setStatus("ready");return;}
      setStatus("checking");
    };
    check();
    const t=setInterval(check,1000);
    return()=>clearInterval(t);
  },[]);

  const handleClick=async()=>{
    if(!window._pushSubscribe){setStatus("error");return;}
    setStatus("requesting");
    const result=await window._pushSubscribe();
    if(result==="ok")setStatus("subscribed");
    else if(result==="denied")setStatus("denied");
    else setStatus("error");
  };

  if(status==="unsupported")return(
    <div style={{marginTop:12,padding:12,background:"#FFF3E0",borderRadius:8,fontSize:11,color:"#E65100"}}>
      ⚠️ Les notifications push ne sont pas supportées sur ce navigateur. Ouvrez l'app depuis l'écran d'accueil (PWA).
    </div>);
  if(status==="denied")return(
    <div style={{marginTop:12,padding:12,background:"#FFEBEE",borderRadius:8,fontSize:11,color:"#C62828"}}>
      🔕 Notifications refusées. Allez dans Réglages → Notifications → La Table Familiale pour les réactiver.
    </div>);
  if(status==="subscribed")return(
    <div style={{marginTop:12,padding:12,background:"#E8F5E9",borderRadius:8,fontSize:11,color:"#2E7D32"}}>
      ✅ Notifications activées ! Vous recevrez les rappels achats frais, batch et cuisson.
    </div>);
  if(status==="checking")return(
    <div style={{marginTop:12,padding:12,background:"#F5F5F5",borderRadius:8,fontSize:11,color:"#757575"}}>
      ⏳ Vérification des notifications...
    </div>);
  return(
    <button onClick={handleClick} disabled={status==="requesting"} style={{
      marginTop:12,width:"100%",padding:14,background:C.forest,color:"#fff",
      border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",
      opacity:status==="requesting"?0.6:1}}>
      {status==="requesting"?"⏳ Activation en cours...":"🔔 Activer les notifications"}
    </button>);
}

// ═══════ LOCK DIALOG (Synthèse + PDF) ═══════
function LockDialog({menu,profiles,onClose}){
  if(!menu)return null;
  const [generating,setGenerating]=useState(false);
  const pdfRef=React.useRef(null);
  const batch=menu.repas.filter(r=>r.batch==="Oui"||r.batch==="Partiel");
  const jour=menu.repas.filter(r=>r.batch==="Non");

  function generateText(){
    let t="🌿 LA TABLE FAMILIALE\nSemaine du "+new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})+"\n\n";
    t+="══ MENU ══\n";
    menu.repas.forEach(p=>{t+=(p.jour||p.jourDate||"")+": "+p.nom+(p.batch!=="Non"?" [BATCH]":"")+"\n";});
    if(menu.entrees.length){t+="\n══ ENTRÉES ══\n";menu.entrees.forEach(e=>{t+="• "+e.nom+"\n";});}
    t+="\n══ BATCH DIMANCHE ══\n";
    batch.forEach(p=>{
      const steps=(p.recette||"").split(/(?=\d+\.)/).filter(s=>s.toLowerCase().includes("batch")).map(s=>s.trim()).join(" ");
      t+="• "+p.nom+": "+(steps||"voir recette")+"\n";
    });
    if(jour.length){t+="\n══ JOUR MÊME ══\n";jour.forEach(p=>{t+=(p.jour||"")+": "+p.nom+" ("+p.temps_prepa+"min)\n";});}
    return t;
  }

  function copyText(){
    const t=generateText();
    if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>alert("Synthèse copiée !"));}
    else{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Copiée !");}
  }

  function downloadPDF(){
    if(!pdfRef.current||!window.html2pdf)return;
    setGenerating(true);
    const opt={
      margin:[10,10,10,10],
      filename:"la-table-familiale-semaine.pdf",
      image:{type:"jpeg",quality:0.95},
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
    };
    html2pdf().set(opt).from(pdfRef.current).save().then(()=>setGenerating(false)).catch(()=>setGenerating(false));
  }

  const dateStr=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,
        width:"100%",maxWidth:440,maxHeight:"85vh",overflowY:"auto"}}>
        <h3 style={{margin:"0 0 12px",fontSize:16,fontWeight:700,color:C.forest,textAlign:"center"}}>🔒 Menu verrouillé !</h3>

        {/* PDF content (rendered but used for export) */}
        <div ref={pdfRef} style={{background:"#fff",padding:16,fontSize:11,lineHeight:1.7}}>
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:800,color:"#1A3A0A"}}>🌿 La Table Familiale</div>
            <div style={{fontSize:12,color:"#4A4A4A"}}>Semaine du {dateStr}</div>
            <div style={{fontSize:10,color:"#7A7A7A"}}>Pour {profiles.join(", ")}</div>
          </div>

          <div style={{borderTop:"2px solid #2D6B0E",paddingTop:8,marginBottom:10}}>
            <div style={{fontWeight:700,color:"#1A3A0A",fontSize:12,marginBottom:6}}>📋 MENU DE LA SEMAINE</div>
            {menu.repas.map(p=>(<div key={p.id} style={{padding:"3px 0",borderBottom:"1px solid #F0EDE5"}}>
              <strong style={{color:"#2D6B0E"}}>{p.jourDate||p.jour}</strong>: {p.nom}
              {p.batch!=="Non"&&<span style={{color:"#B8860B",fontSize:10}}> [{p.batch}]</span>}
            </div>))}
          </div>

          {menu.entrees.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#B8860B",fontSize:12,marginBottom:4}}>🥕 ENTRÉES (pool libre)</div>
            {menu.entrees.map(e=><div key={e.id}>• {e.nom} ({e.genre}, {e.temps_prepa}min)</div>)}
          </div>}

          {batch.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#B8860B",fontSize:12,marginBottom:4}}>👨‍🍳 BATCH COOKING — Dimanche</div>
            {batch.map(p=>{
              const steps=(p.recette||"").split(/(?=\d+\.)/).filter(s=>s.toLowerCase().includes("batch")).map(s=>s.trim());
              return(<div key={p.id} style={{marginBottom:4}}>
                <strong>{p.nom}</strong> ({p.temps_batch!=="—"?p.temps_batch+"min":""})<br/>
                {steps.length>0&&<span style={{color:"#B8860B"}}>{steps[0]}</span>}
              </div>);
            })}
            <div style={{marginTop:6,padding:6,background:"#FFF3F0",borderRadius:4,fontSize:10,color:"#C62828"}}>
              ⚠️ Riz = cuire au dernier moment · Viande = marinade uniquement, NE PAS cuire
            </div>
          </div>}

          {jour.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontWeight:700,color:"#4A4A4A",fontSize:12,marginBottom:4}}>🔵 JOUR MÊME</div>
            {jour.map(p=><div key={p.id}>{p.jourDate||p.jour}: {p.nom} ({p.temps_prepa}min)</div>)}
          </div>}
        </div>

        {/* Action buttons */}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={downloadPDF} disabled={generating} style={{flex:1,padding:12,borderRadius:10,border:"none",
            background:`linear-gradient(135deg,${C.forest},${C.fL})`,color:"#fff",fontSize:13,fontWeight:700,
            cursor:generating?"wait":"pointer",opacity:generating?.6:1}}>
            {generating?"⏳ Génération...":"📄 Télécharger PDF"}</button>
          <button onClick={copyText} style={{padding:"12px 14px",borderRadius:10,border:`1px solid ${C.bdr}`,
            background:"#fff",fontSize:13,cursor:"pointer"}}>📋</button>
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:8,padding:10,borderRadius:10,
          border:`1px solid ${C.bdr}`,background:"#fff",fontSize:13,cursor:"pointer",color:C.tM}}>Fermer</button>
      </div>
    </div>
  );
}

      const ei=(a,isE)=>({
        id:(isE?"e":"p")+a[0],nom:a[1],type:a[2],genre:a[3],saison:a[4],
        temps_prepa:a[5],batch:a[6],temps_batch:a[7],
        ingredients:a[8]||[],recette:a[10]||"",
        macros:{
          Damien:a[9]?.D?{kcal:a[9].D[0],prot:a[9].D[1],lip:a[9].D[2],gluc:a[9].D[3]}:null,
          Maroie:a[9]?.M?{kcal:a[9].M[0],prot:a[9].M[1],lip:a[9].M[2],gluc:a[9].M[3]}:null,
          "Maël":a[9]?.E?{kcal:a[9].E[0],prot:a[9].E[1],lip:a[9].E[2],gluc:a[9].E[3]}:null,
        },
      });
      DATA={
        plats:raw.p.map(p=>ei(p,false)),
        entrees:raw.e.map(e=>ei(e,true)),
        stock:raw.s.map(([n,a])=>({nom:n,articles:a.map(x=>({nom:x}))})),
        profils:Object.fromEntries(Object.entries(raw.pr).map(([n,[cal,prot,lip,gluc,age,poids,taille,imc,act,obj,rep]])=>
          [n,{nom:n,calories:cal,proteines:prot,lipides:lip,glucides:gluc,age,poids,taille,imc,activite:act,objectif:obj,repartition:rep}])),
      };
      setLoaded(true);
    }).catch(e=>setError(e.message));
  },[]);
  if(error)return(<div style={{padding:40,textAlign:"center"}}>
    <p style={{color:"#C62828",fontSize:16}}>Erreur: {error}</p>
    <p style={{color:"#7A7A7A",fontSize:12}}>Vérifiez que data.json est présent.</p></div>);
  if(!loaded)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",
    justifyContent:"center",height:"100vh",background:"#F7F5EF"}}>
    <div style={{fontSize:48}}>🌿</div>
    <p style={{color:"#7A7A7A",fontSize:14,marginTop:12}}>Chargement...</p></div>);
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

  <script>
    // ═══════ PUSH NOTIFICATIONS ═══════
    const VAPID_PUBLIC_KEY = "BMQO2VO5Giv8BxgjWzdARnyYkAxrxeY4ww7sybm9gahbxMQM6u6RkNNPG0GLmf-AgU_MXsLiX8Eny-2ENsru16o";

    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    async function subscribePush(reg) {
      try {
        const existing = await reg.pushManager.getSubscription();
        if (existing) { savePushSubscription(existing); return; }
        const permission = await Notification.requestPermission();
        if (permission !== "granted") { console.log("🔕 Notifications refusées"); return; }
        const subscription = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        savePushSubscription(subscription);
        console.log("🔔 Push subscription active");
      } catch (err) { console.warn("Push subscribe error:", err); }
    }

    function savePushSubscription(subscription) {
      if (!window._fb) return;
      const sub = subscription.toJSON();
      const key = btoa(sub.endpoint).replace(/[.#$/\[\]]/g, "_").slice(-40);
      window._fb.ref("push_subscriptions/" + key).set(sub);
      console.log("💾 Subscription sauvegardée dans Firebase");
    }

    // Expose globally for the in-app button
    window._pushSubscribe = null;
    window._pushStatus = "loading";

    async function checkAndSubscribe(reg) {
      window._swReg = reg;
      try {
        const existing = await reg.pushManager.getSubscription();
        if (existing) {
          savePushSubscription(existing);
          window._pushStatus = "subscribed";
          return;
        }
      } catch(e) {}
      // On iOS, permission must be triggered by user gesture
      // So we just mark as "ready" and let the button handle it
      if (Notification.permission === "granted") {
        subscribePush(reg);
      } else {
        window._pushStatus = "ready";
      }
    }

    window._pushSubscribe = async function() {
      if (!window._swReg) return "no-sw";
      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") return "denied";
        const subscription = await window._swReg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        savePushSubscription(subscription);
        window._pushStatus = "subscribed";
        return "ok";
      } catch (err) {
        console.warn("Push subscribe error:", err);
        return "error";
      }
    };

    // Register SW
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").then(reg => {
        console.log("📱 Service Worker enregistré");
        if (reg.active) {
          checkAndSubscribe(reg);
        } else {
          reg.addEventListener("updatefound", () => {
            const nw = reg.installing;
            if (nw) nw.addEventListener("statechange", () => {
              if (nw.state === "activated") checkAndSubscribe(reg);
            });
          });
        }
      }).catch(err => console.warn("SW error:", err));
    }
  </script>
