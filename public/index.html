// ── STORAGE (Firebase Realtime DB + localStorage fallback) ──
function sGet(k,fb){
  try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}
}
function sSet(k,v){
  try{
    localStorage.setItem(k,JSON.stringify(v));
    // Sync to Firebase
    if(window._fb){window._fb.ref(k).set(v).catch(e=>console.warn("Firebase write error:",e));}
  }catch(e){console.error(e);}
}
// Listen for Firebase changes (sync from other devices)
function fbListen(k,callback){
  if(!window._fb)return;
  window._fb.ref(k).on("value",snap=>{
    const val=snap.val();
    if(val!==null&&val!==undefined){
      localStorage.setItem(k,JSON.stringify(val));
      callback(val);
    }
  });
}

// ═══ Helper : convertir une salade BASE_SALADES en format compatible menu ═══
// Génère le champ `ingredients` au format [[nom, unité, qD, qM, qE]] depuis composition
function buildSaladIngredients(salad){
  const ings=[];
  Object.values(salad.composition).forEach(ids=>ids.forEach(id=>{
    const i=SALAD_ALL_INGS[id];if(!i)return;
    const p=i.portion_g||i.portion_ml||0;const u=i.portion_g?"g":"ml";
    const qD=Math.round(p*SALAD_PROFILES.damien.mult);
    const qM=Math.round(p*SALAD_PROFILES.maroie.mult);
    const qE=Math.round(p*SALAD_PROFILES.mael.mult);
    ings.push([i.nom,u,qD,qM,qE]);
  }));
  return ings;
}
// Convertir une salade BASE_SALADES en objet compatible avec le menu (même shape que DATA.plats)
function buildSaladForMenu(salad){
  const ings=buildSaladIngredients(salad);
  const cD=salCalcNutriGlobal(salad.composition,SALAD_PROFILES.damien.mult);
  const cM=salCalcNutriGlobal(salad.composition,SALAD_PROFILES.maroie.mult);
  const cE=salCalcNutriGlobal(salad.composition,SALAD_PROFILES.mael.mult);
  return{
    id:salad.id,nom:salad.nom,type:"Salade/bowl",genre:salad.cuisine,saison:salad.saison,
    temps_prepa:salad.temps,batch:salad.batch,temps_batch:salad.batch!=="Non"?String(salad.temps):"—",
    ingredients:ings,recette:salad.recette,
    macros:{Damien:{kcal:cD.cal,prot:cD.prot,lip:cD.lip,gluc:cD.gluc},Maroie:{kcal:cM.cal,prot:cM.prot,lip:cM.lip,gluc:cM.gluc},"Maël":{kcal:cE.cal,prot:cE.prot,lip:cE.lip,gluc:cE.gluc}},
    _salId:salad.id, // lien vers BASE_SALADES pour le BatchTab
    composition:salad.composition, // garder la composition pour le BatchTab
  };
}
// Version globale de salCalcNutri (avant que la fonction dans le scope SaladeTab soit définie)
function salCalcNutriGlobal(comp,mult){
  let cal=0,prot=0,lip=0,gluc=0;
  Object.values(comp).forEach(ids=>ids.forEach(id=>{
    const i=SALAD_ALL_INGS[id];if(!i)return;
    const p=(i.portion_g||i.portion_ml||20)*mult;
    cal+=(i.cal_100g*p)/100;prot+=((i.prot_100g||0)*p)/100;
    lip+=((i.lip_100g||0)*p)/100;gluc+=((i.gluc_100g||0)*p)/100;
  }));
  return{cal:Math.round(cal),prot:Math.round(prot*10)/10,lip:Math.round(lip*10)/10,gluc:Math.round(gluc*10)/10};
}

function getWeekDays(startDate){
  const d=startDate||new Date();
  const days=[];
  for(let i=0;i<7;i++){
    const day=new Date(d);day.setDate(d.getDate()+i);
    const name=JOURS_ALL[day.getDay()];
    const dateStr=day.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
    const capDate=dateStr.charAt(0).toUpperCase()+dateStr.slice(1);
    days.push({name,dateStr:name+" "+capDate,full:name+" "+capDate});
  }
  return days;
}

  // ── Plat/entrée soft delete ──
  const [platDel,setPlatDel]=useState([]);
  // ── Salade tab states ──
  const [saladRat,setSaladRat]=useState({});
  const [saladPhotos,setSaladPhotos]=useState({});
  const [saladCustom,setSaladCustom]=useState([]);
  const [saladDel,setSaladDel]=useState([]);
  const [saladProf,setSaladProf]=useState(["damien","maroie","mael"]);
  const [saladBs,setSaladBs]=useState([]);

  useEffect(()=>{
    // Load from localStorage first (instant)
    setRatings(sGet("ltf2_rat",{}));setObs(sGet("ltf2_obs",{}));
    setMenu(sGet("ltf2_menu",null));setLocked(sGet("ltf2_lock",false));
    setHistory(sGet("ltf2_hist",[]));setProfiles(sGet("ltf2_prof",["Damien","Maroie","Maël"]));
    setStockCk(sGet("ltf2_stk",{}));setCourseCk(sGet("ltf2_crs",{}));
    setPhotos(sGet("ltf2_photos",{}));
    setStockOrder(sGet("ltf2_sord",{}));
    setCustomArt(sGet("ltf2_cart",{add:[],del:[],ren:{}}));
    setPlatDel(sGet("ltf2_plat_del",[]));
    // Salade tab
    setSaladRat(sGet("ltf2_salad_rat",{}));setSaladPhotos(sGet("ltf2_salad_photos",{}));
    setSaladCustom(sGet("ltf2_salad_custom",[]));setSaladDel(sGet("ltf2_salad_del",[]));
    setSaladProf(sGet("ltf2_salad_prof",["damien","maroie","mael"]));setSaladBs(sGet("ltf2_salad_bs",[]));
    // Listen for Firebase changes (sync from Maroie's phone)
    fbListen("ltf2_rat",setRatings);
    fbListen("ltf2_obs",setObs);
    fbListen("ltf2_menu",v=>{if(v)setMenu(v);});
    fbListen("ltf2_lock",setLocked);
    fbListen("ltf2_hist",v=>{if(v)setHistory(v);});
    fbListen("ltf2_stk",setStockCk);
    fbListen("ltf2_crs",setCourseCk);
    fbListen("ltf2_photos",setPhotos);
    fbListen("ltf2_sord",setStockOrder);
    fbListen("ltf2_cart",v=>{if(v)setCustomArt(v);});
    fbListen("ltf2_plat_del",v=>setPlatDel(v||[]));
    // Salade tab sync
    fbListen("ltf2_salad_rat",v=>setSaladRat(v||{}));
    fbListen("ltf2_salad_photos",v=>setSaladPhotos(v||{}));
    fbListen("ltf2_salad_custom",v=>setSaladCustom(v||[]));
    fbListen("ltf2_salad_del",v=>setSaladDel(v||[]));
    fbListen("ltf2_salad_prof",v=>setSaladProf(v||["damien","maroie","mael"]));
    fbListen("ltf2_salad_bs",v=>setSaladBs(v||[]));
  },[]);

  const sv={
    menu:m=>{setMenu(m);sSet("ltf2_menu",m);},
    rat:(id,v)=>{const n={...ratings,[id]:v};setRatings(n);sSet("ltf2_rat",n);},
    obs:(id,t)=>{const n={...obs,[id]:t};setObs(n);sSet("ltf2_obs",n);},
    lock:()=>{
      const n=!locked;setLocked(n);sSet("ltf2_lock",n);
      if(n){sSet("ltf2_lock_at",new Date().toISOString());}
      if(n&&menu){const h=[{date:new Date().toISOString(),menu:JSON.parse(JSON.stringify(menu))},...history].slice(0,4);
        setHistory(h);sSet("ltf2_hist",h);}
    },
    prof:p=>{setProfiles(p);sSet("ltf2_prof",p);},
    stk:s=>{setStockCk(s);sSet("ltf2_stk",s);},
    crs:c=>{setCourseCk(c);sSet("ltf2_crs",c);},
    photo:(id,url)=>{const n={...photos,[id]:url};setPhotos(n);sSet("ltf2_photos",n);},
    sord:o=>{setStockOrder(o);sSet("ltf2_sord",o);},
    cart:c=>{setCustomArt(c);sSet("ltf2_cart",c);},
    pDel:d=>{setPlatDel(d);sSet("ltf2_plat_del",d);},
    // Salade tab savers
    sRat:(id,v)=>{setSaladRat(p=>{const n={...p,[id]:v};sSet("ltf2_salad_rat",n);return n;});},
    sPhoto:(id,url)=>{setSaladPhotos(p=>{const n={...p};if(url)n[id]=url;else delete n[id];sSet("ltf2_salad_photos",n);return n;});},
    sCustom:c=>{setSaladCustom(c);sSet("ltf2_salad_custom",c);},
    sDel:d=>{setSaladDel(d);sSet("ltf2_salad_del",d);},
    sProf:p=>{setSaladProf(p);sSet("ltf2_salad_prof",p);},
    sBs:b=>{setSaladBs(b);sSet("ltf2_salad_bs",b);},
  };

  const TABS=[{i:"📋",l:"Menu"},{i:"🍽",l:"Repas"},{i:"🛒",l:"Courses"},
    {i:"👨‍🍳",l:"Batch"},{i:"📦",l:"Stock"},{i:"👨‍👩‍👦",l:"Profils"},{i:"🥗",l:"Salade"}];

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"system-ui,-apple-system,sans-serif"}}>
      {/* HEADER */}
      <header style={{background:`linear-gradient(135deg,${C.forest},${C.fL})`,color:"#fff",
        padding:"12px 16px 8px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.15)",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          <div>
            <h1 style={{margin:0,fontSize:17,fontWeight:700}}>🌿 La Table Familiale</h1>
            <p style={{margin:"1px 0 0",fontSize:10,opacity:.8}}>
              {DATA.plats.length} plats · {DATA.entrees.length} entrées · {BASE_SALADES.length} salades</p>
          </div>
          {menu&&<button onClick={()=>{if(!locked){sv.lock();setLockDialog(true);}else{sv.lock();}}} style={{background:locked?C.gold:"rgba(255,255,255,.15)",
            border:"none",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:12,cursor:"pointer",position:"absolute",right:0}}>
            {locked?"🔒":"🔓"}</button>}
        </div>
      </header>

      {/* NAV EN HAUT (sous le header) */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${C.bdr}`,display:"flex",
        justifyContent:"space-around",padding:"6px 0",position:"sticky",top:55,zIndex:99,
        boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{background:"none",border:"none",
            cursor:"pointer",padding:"4px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
            opacity:tab===i?1:.4,borderBottom:tab===i?`2px solid ${C.fL}`:"2px solid transparent",
            transition:"all .2s"}}>
            <span style={{fontSize:16}}>{t.i}</span>
            <span style={{fontSize:9,fontWeight:tab===i?700:400,color:tab===i?C.fL:C.tL}}>{t.l}</span>
          </button>
        ))}
      </nav>

      {/* CONTENT */}
      <main style={{paddingBottom:20}}>
        {tab===0&&<MenuTab menu={menu} setMenu={sv.menu} locked={locked} profiles={profiles}
          setProfiles={sv.prof} ratings={ratings} saladRat={saladRat} photos={photos} onSel={setSelPlat} platDel={platDel}/>}
        {tab===1&&<CatalogTab ratings={ratings} profiles={profiles} photos={photos} onSel={setSelPlat} platDel={platDel} onPlatDel={sv.pDel}/>}
        {tab===2&&<CoursesTab menu={menu} profiles={profiles} stockCk={stockCk} courseCk={courseCk} setCk={sv.crs} stockOrder={stockOrder}/>}
        {tab===3&&<BatchTab menu={menu}/>}
        {tab===4&&<StockTab stockCk={stockCk} setStockCk={sv.stk} stockOrder={stockOrder} setStockOrder={sv.sord} customArt={customArt} setCustomArt={sv.cart}/>}
        {tab===5&&<ProfilsTab menu={menu}/>}
        {tab===6&&<SaladeTab ratings={saladRat} photos={saladPhotos} customSalads={saladCustom}
          deletedIds={saladDel} activeProfiles={saladProf} bestsellerIds={saladBs}
          menu={menu} setMenu={sv.menu}
          onRate={sv.sRat} onPhoto={sv.sPhoto} onCustom={sv.sCustom}
          onDel={sv.sDel} onProf={sv.sProf} onBs={sv.sBs}/>}
      </main>

      {lockDialog&&<LockDialog menu={menu} profiles={profiles} onClose={()=>setLockDialog(false)}/>}

      {selPlat&&<Modal plat={selPlat} photos={photos} onClose={()=>setSelPlat(null)} profiles={profiles}
        rating={ratings[selPlat.id]||0} onRate={v=>sv.rat(selPlat.id,v)}
        obs={obs[selPlat.id]||""} onObs={t=>sv.obs(selPlat.id,t)}
        photo={photos[selPlat.id]||""} onPhoto={u=>sv.photo(selPlat.id,u)}/>}
    </div>
  );
}

function Tag({text,color}){
  return <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:color+"14",
    color,fontWeight:500,whiteSpace:"nowrap"}}>{text}</span>;
}
function Chip({label,on,click}){
  return <button onClick={click} style={{padding:"4px 10px",borderRadius:16,
    border:`1px solid ${on?C.fL:C.bdr}`,background:on?C.fL:"#fff",
    color:on?"#fff":C.tM,fontSize:10,fontWeight:on?600:400,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>;
}

// ═══════ TAB 1 — MENU ═══════
function MenuTab({menu:rawMenu,setMenu,locked,profiles,setProfiles,ratings,saladRat,photos,onSel,platDel}){
  // Normaliser le menu (protection contre anciens menus Firebase sans certains champs)
  const menu=rawMenu?{...rawMenu,repas:rawMenu.repas||[],entrees:rawMenu.entrees||[],salades:rawMenu.salades||[]}:null;
  const [nbR,setNbR]=useState(menu?.repas?.length||7);
  const [nbE,setNbE]=useState(menu?.entrees?.length||2);
  const [saison,setSaison]=useState("Toutes saisons");
  const [noteF,setNoteF]=useState(0);
  const [confirm,setConfirm]=useState(false);
  const [replIdx,setReplIdx]=useState(null);
  const [replListR,setReplListR]=useState(null); // {idx,type} — liste choix repas
  const [replSIdx,setReplSIdx]=useState(null);
  const [replEIdx,setReplEIdx]=useState(null);
  const [replListE,setReplListE]=useState(null); // {idx,genre} — liste choix entrées

  // Pool salades (depuis BASE_SALADES — module Eat Salade Maison)
  const filteredS=useMemo(()=>BASE_SALADES.filter(s=>{
    if(saison==="Toutes saisons") return true;
    if(saison==="Printemps") return s.saison==="Toutes saisons"||s.saison==="Été";
    return s.saison==="Toutes saisons"||s.saison===saison;
  }).filter(s=>noteF===0||((saladRat||{})[s.id]||0)>=noteF),[saison,noteF,saladRat]);

  const filtered=useMemo(()=>DATA.plats.filter(p=>{
    if(p.type==="Salade/bowl") return false; // Salades = midi uniquement (onglet 7)
    if((platDel||[]).includes(p.id)) return false; // Plats supprimés
    if(saison==="Toutes saisons") return true;
    if(saison==="Printemps") return p.saison==="Toutes saisons"||p.saison==="Été";
    return p.saison==="Toutes saisons"||p.saison===saison;
  }).filter(p=>noteF===0||(ratings[p.id]||0)>=noteF),[saison,noteF,ratings,platDel]);

  const filteredE=useMemo(()=>DATA.entrees.filter(e=>{
    if(saison==="Toutes saisons") return true;
    if(saison==="Printemps") return e.saison==="Toutes saisons"||e.saison==="Été";
    return e.saison==="Toutes saisons"||e.saison===saison;
  }),[saison]);

  function generate(){
    if(menu&&!confirm){setConfirm(true);return;}
    setConfirm(false);
    const sh=nbR>0?[...filtered].sort(()=>Math.random()-.5).slice(0,nbR):[];
    const bo={Oui:0,Partiel:1,Non:2};
    sh.sort((a,b)=>(bo[a.batch]??1)-(bo[b.batch]??1));
    const weekDays=getWeekDays(new Date());
    const repas=sh.map((p,i)=>({...p,jour:weekDays[i%7].full,jourShort:weekDays[i%7].name,jourIdx:i%7,jourDate:weekDays[i%7].dateStr}));
    const ent=nbE>0?[...filteredE].sort(()=>Math.random()-.5).slice(0,nbE):[];
    // Conserver les salades existantes (ajoutées manuellement depuis l'onglet Salade)
    const salades=menu?.salades||[];
    setMenu({repas,entrees:ent,salades,at:new Date().toISOString(),startDate:new Date().toISOString()});
    setReplIdx(null);setReplListR(null);setReplEIdx(null);setReplListE(null);setReplSIdx(null);
  }
  function removeS(idx){if(locked)return;
    const wd=getWeekDays(menu.startDate?new Date(menu.startDate):new Date());
    const s=(menu.salades||[]).filter((_,i)=>i!==idx).map((s,i)=>({...s,jour:wd[i%7].full,jourShort:wd[i%7].name,jourIdx:i%7,jourDate:wd[i%7].dateStr}));
    setMenu({...menu,salades:s});}
  function replaceS(idx,cuisine){if(locked)return;
    const cands=filteredS.filter(p=>p.cuisine===cuisine&&!(menu.salades||[]).some(s=>s.id===p.id));
    if(!cands.length)return;
    const picked=buildSaladForMenu(cands[Math.floor(Math.random()*cands.length)]);
    const s=[...(menu.salades||[])];s[idx]={...picked,jour:s[idx].jour,jourShort:s[idx].jourShort,jourIdx:s[idx].jourIdx,jourDate:s[idx].jourDate};
    setMenu({...menu,salades:s});setReplSIdx(null);}
  function removeR(idx){if(locked)return;
    const wd=getWeekDays(menu.startDate?new Date(menu.startDate):new Date());
    const r=menu.repas.filter((_,i)=>i!==idx).map((r,i)=>({...r,jour:wd[i%7].full,jourShort:wd[i%7].name,jourIdx:i%7,jourDate:wd[i%7].dateStr}));
    setMenu({...menu,repas:r});setReplIdx(null);setReplListR(null);}
  function replaceR(idx,type){if(locked)return;
    const cands=filtered.filter(p=>p.type===type&&!menu.repas.some(r=>r.id===p.id));
    if(!cands.length)return;
    const r=[...menu.repas];r[idx]={...cands[Math.floor(Math.random()*cands.length)],jour:r[idx].jour,jourShort:r[idx].jourShort,jourIdx:r[idx].jourIdx,jourDate:r[idx].jourDate};
    setMenu({...menu,repas:r});setReplIdx(null);setReplListR(null);}
  function pickR(idx,plat){if(locked)return;
    const r=[...menu.repas];r[idx]={...plat,jour:r[idx].jour,jourShort:r[idx].jourShort,jourIdx:r[idx].jourIdx,jourDate:r[idx].jourDate};
    setMenu({...menu,repas:r});setReplIdx(null);setReplListR(null);}
  function removeE(idx){if(locked)return;
    const e=menu.entrees.filter((_,i)=>i!==idx);
    setMenu({...menu,entrees:e});setReplEIdx(null);setReplListE(null);}
  function replaceE(idx,genre){if(locked)return;
    const cands=filteredE.filter(e=>e.genre===genre&&!menu.entrees.some(r=>r.id===e.id));
    if(!cands.length)return;
    const e=[...menu.entrees];e[idx]=cands[Math.floor(Math.random()*cands.length)];
    setMenu({...menu,entrees:e});setReplEIdx(null);setReplListE(null);}
  function pickE(idx,entree){if(locked)return;
    const e=[...menu.entrees];e[idx]=entree;
    setMenu({...menu,entrees:e});setReplEIdx(null);setReplListE(null);}
  function toggleProf(name){
    const n=profiles.includes(name)?profiles.filter(p=>p!==name):[...profiles,name];
    if(!n.length)return;setProfiles(n);}

  return (
    <div style={{padding:14}}>
      <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${C.bdr}`}}>
        <h2 style={{margin:"0 0 12px",fontSize:16,fontWeight:700,color:C.forest}}>Générer le menu</h2>
        <div style={{display:"flex",gap:6,marginBottom:12,justifyContent:"center"}}>
          {["Damien","Maroie","Maël"].map(n=>(
            <button key={n} onClick={()=>toggleProf(n)} style={{padding:"5px 12px",borderRadius:18,fontSize:12,
              cursor:"pointer",border:`2px solid ${PC[n]}`,fontWeight:600,
              background:profiles.includes(n)?PC[n]:"transparent",
              color:profiles.includes(n)?"#fff":PC[n]}}>{n}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <label style={{fontSize:11,color:C.tM,fontWeight:600}}>Repas: <strong style={{color:C.forest,fontSize:15}}>{nbR}</strong></label>
            <input type="range" min={0} max={12} value={nbR} onChange={e=>setNbR(+e.target.value)} style={{width:"100%",accentColor:C.fL}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:C.tM,fontWeight:600}}>Entrées: <strong style={{color:C.forest,fontSize:15}}>{nbE}</strong></label>
            <input type="range" min={0} max={8} value={nbE} onChange={e=>setNbE(+e.target.value)} style={{width:"100%",accentColor:C.fL}}/>
          </div>
        </div>

        {/* FILTRE SAISON simplifié : 4 saisons + Toutes */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,justifyContent:"center"}}>
          {["Toutes saisons","Printemps","Été","Automne","Hiver"].map(s=>(
            <button key={s} onClick={()=>setSaison(s)} style={{padding:"5px 12px",borderRadius:18,fontSize:11,
              cursor:"pointer",border:`1px solid ${saison===s?C.fL:C.bdr}`,fontWeight:saison===s?700:400,
              background:saison===s?C.fL:"#fff",color:saison===s?"#fff":C.tM}}>
              {s==="Printemps"?"🌸":s==="Été"?"☀️":s==="Automne"?"🍂":s==="Hiver"?"❄️":"🌿"} {s}
            </button>
          ))}
          <span style={{fontSize:11,color:C.tL,alignSelf:"center"}}>{filtered.length} plats</span>
        </div>

        <div style={{textAlign:"center",marginBottom:12}}><select value={noteF} onChange={e=>setNoteF(+e.target.value)} style={{padding:"5px 10px",
          borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:12,background:"#fff"}}>
          <option value={0}>Toutes notes</option>
          {[1,2,3,4,5].map(n=><option key={n} value={n}>≥ {"⭐".repeat(n)}</option>)}
        </select></div>

        <button onClick={generate} disabled={locked} style={{width:"100%",padding:12,borderRadius:10,
          border:"none",background:locked?C.tL:`linear-gradient(135deg,${C.forest},${C.fL})`,
          color:"#fff",fontSize:14,fontWeight:700,cursor:locked?"not-allowed":"pointer",
          boxShadow:locked?"none":"0 3px 10px rgba(26,58,10,.3)"}}>
          {locked?"🔒 Verrouillé":`🔄 Générer ${nbR} repas, ${nbE} entrées`}
        </button>

        {confirm&&<div style={{marginTop:10,padding:12,background:C.dangerBg,borderRadius:10}}>
          <p style={{margin:"0 0 8px",fontSize:12,color:C.danger,fontWeight:600}}>⚠️ Remplacer le menu ?</p>
          <div style={{display:"flex",gap:6}}>
            <button onClick={generate} style={{flex:1,padding:8,borderRadius:8,border:"none",
              background:C.danger,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Oui</button>
            <button onClick={()=>setConfirm(false)} style={{flex:1,padding:8,borderRadius:8,
              border:`1px solid ${C.bdr}`,background:"#fff",fontSize:12,cursor:"pointer"}}>Non</button>
          </div>
        </div>}
      </div>

      {menu&&<>
        <h3 style={{fontSize:13,color:C.forest,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:.5,textAlign:"center"}}>
          🍽 Repas ({menu.repas.length})
        </h3>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {menu.repas.map((p,idx)=>{
            const fresh=idx>=Math.max(0,menu.repas.length-(menu.repas.length>4?3:1));
            return(<div key={p.id+"-"+idx}>
              <div style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.bdr}`,position:"relative"}}>
                <div style={{position:"absolute",top:-7,left:12,background:fresh?"#E3F2FD":C.okBg,
                  padding:"1px 8px",borderRadius:8,fontSize:9,fontWeight:700,
                  color:fresh?C.blue:C.ok,border:`1px solid ${fresh?C.blue+"33":C.ok+"33"}`}}>
                  {p.jourDate||p.jour} {fresh&&"🧊"}</div>
                <div onClick={()=>onSel(p)} style={{cursor:"pointer",marginTop:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {photos[p.id]?<img src={photos[p.id]} style={{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0}} onError={e=>{e.target.style.display="none"}}/>:<span style={{fontSize:24}}>{ET[p.type]||"🍽"}</span>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nom}</div>
                      <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
                        <Tag text={p.type.split("/")[0]} color={C.fL}/>
                        <Tag text={`${p.temps_prepa}min`} color={C.tM}/>
                        {p.batch!=="Non"&&<Tag text={`${p.batch==="Oui"?"🟢":"🟡"} Batch`} color={C.gold}/>}
                      </div>
                    </div>
                  </div>
                  {p.macros&&<div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
                    {profiles.map(name=>p.macros[name]&&(
                      <span key={name} style={{fontSize:10,padding:"1px 6px",borderRadius:8,
                        background:PC[name]+"15",color:PC[name],fontWeight:600}}>
                        {name[0]}: {p.macros[name].prot}g P · {p.macros[name].kcal}kcal</span>
                    ))}</div>}
                </div>
                {!locked&&<div style={{display:"flex",justifyContent:"flex-end",gap:4,marginTop:6}}>
                  <button onClick={()=>{setReplIdx(replIdx===idx?null:idx);setReplListR(null);}} style={{padding:"3px 8px",borderRadius:6,
                    border:`1px solid ${C.bdr}`,background:"#fff",fontSize:10,cursor:"pointer",color:C.tM}}>🔄</button>
                  <button onClick={()=>removeR(idx)} style={{padding:"3px 8px",borderRadius:6,
                    border:`1px solid ${C.danger}33`,background:C.dangerBg,fontSize:10,cursor:"pointer",color:C.danger}}>✕</button>
                </div>}
              </div>
              {replIdx===idx&&!locked&&(
                <div style={{padding:8,background:"#fff",borderRadius:replListR&&replListR.idx===idx?"0":"0 0 10px 10px",border:`1px solid ${C.bdr}`,borderTop:"none",display:"flex",flexWrap:"wrap",gap:4}}>

// ═══════ TAB 2 — CATALOGUE ═══════
function CatalogTab({ratings,profiles,photos,onSel,platDel,onPlatDel}){
  const [search,setSearch]=useState("");
  const [tF,setTF]=useState("all");
  const [cF,setCF]=useState("all");
  const [showE,setShowE]=useState(false);
  const [sF,setSF]=useState("Toutes saisons");
  const [showDeleted,setShowDeleted]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);
  const del=platDel||[];
  const items=useMemo(()=>{
    let list=showE?DATA.entrees:DATA.plats;
    if(!showDeleted) list=list.filter(p=>!del.includes(p.id));
    else list=list.filter(p=>del.includes(p.id));
    if(sF!=="Toutes saisons"){
      if(sF==="Printemps") list=list.filter(p=>p.saison==="Toutes saisons"||p.saison==="Été");
      else list=list.filter(p=>p.saison==="Toutes saisons"||p.saison===sF);
    }
    if(tF!=="all")list=list.filter(p=>p.type===tF);
    if(cF!=="all")list=list.filter(p=>p.genre===cF);
    if(search.trim()){const q=search.toLowerCase();list=list.filter(p=>p.nom.toLowerCase().includes(q));}
    return list;
  },[showE,sF,tF,cF,search,del,showDeleted]);

  const delCount=showE?DATA.entrees.filter(p=>del.includes(p.id)).length:DATA.plats.filter(p=>del.includes(p.id)).length;
  const activeCount=showE?DATA.entrees.filter(p=>!del.includes(p.id)).length:DATA.plats.filter(p=>!del.includes(p.id)).length;

  function toggleDel(id){
    if(del.includes(id)){onPlatDel(del.filter(d=>d!==id));}
    else{onPlatDel([...del,id]);}
    setConfirmDel(null);
  }

  return(<div style={{padding:14,maxWidth:600,margin:"0 auto",textAlign:"center"}}>
    <div style={{position:"relative",marginBottom:10}}>
      <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14}}>🔍</span>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..."
        style={{width:"100%",padding:"8px 10px 8px 32px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff",boxSizing:"border-box"}}/>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:10,justifyContent:"center"}}>
      <button onClick={()=>{setShowE(false);setShowDeleted(false);}} style={{flex:1,padding:7,borderRadius:8,border:`2px solid ${C.fL}`,
        background:!showE&&!showDeleted?C.fL:"transparent",color:!showE&&!showDeleted?"#fff":C.fL,fontSize:12,fontWeight:600,cursor:"pointer"}}>🍽 Plats ({activeCount})</button>
      <button onClick={()=>{setShowE(true);setShowDeleted(false);}} style={{flex:1,padding:7,borderRadius:8,border:`2px solid ${C.gold}`,
        background:showE&&!showDeleted?C.gold:"transparent",color:showE&&!showDeleted?"#fff":C.gold,fontSize:12,fontWeight:600,cursor:"pointer"}}>🥕 Entrées ({DATA.entrees.filter(p=>!del.includes(p.id)).length})</button>
    </div>
    {delCount>0&&<div style={{marginBottom:10}}>
      <button onClick={()=>setShowDeleted(!showDeleted)} style={{padding:"5px 14px",borderRadius:18,fontSize:11,
        border:`1px solid ${showDeleted?C.danger:C.bdr}`,background:showDeleted?C.dangerBg:"#fff",
        color:showDeleted?C.danger:C.tL,cursor:"pointer",fontWeight:showDeleted?600:400}}>
        {showDeleted?"← Retour aux actifs":`🗑 Masqués (${delCount})`}</button>
    </div>}
    <div style={{display:"flex",gap:4,marginBottom:8,justifyContent:"center",flexWrap:"wrap"}}>
      {["Toutes saisons","Printemps","Été","Automne","Hiver"].map(s=>(
        <Chip key={s} label={`${s==="Printemps"?"🌸":s==="Été"?"☀️":s==="Automne"?"🍂":s==="Hiver"?"❄️":"🌿"} ${s}`}
          on={sF===s} click={()=>setSF(s)}/>
      ))}
    </div>
    <div style={{display:"flex",gap:4,marginBottom:8,overflowX:"auto",paddingBottom:4,justifyContent:"center",flexWrap:"wrap"}}>
      <Chip label="Tous" on={tF==="all"} click={()=>setTF("all")}/>
      {TYPES.map(t=><Chip key={t} label={`${ET[t]||""} ${t.split("/")[0]}`} on={tF===t} click={()=>setTF(t)}/>)}
    </div>
    <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:4,justifyContent:"center",flexWrap:"wrap"}}>
      <Chip label="Toutes" on={cF==="all"} click={()=>setCF("all")}/>
      {CUISINES.map(c=><Chip key={c} label={`${EC[c]||""} ${c}`} on={cF===c} click={()=>setCF(c)}/>)}
    </div>
    <p style={{fontSize:11,color:C.tL,marginBottom:8}}>{items.length} résultat{items.length>1?"s":""}{showDeleted?" (masqués)":""}</p>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {items.map(p=>{const isDel=del.includes(p.id);return(<div key={p.id}>
        <div style={{background:isDel?"#fff5f5":"#fff",borderRadius:10,padding:"10px 12px",
          border:`1px solid ${isDel?C.danger+"33":C.bdr}`,display:"flex",alignItems:"center",gap:10}}>
          <div onClick={()=>onSel(p)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>
            {photos[p.id]?<img src={photos[p.id]} style={{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0}} onError={e=>{e.target.style.display="none"}}/>:<span style={{fontSize:24,flexShrink:0}}>{ET[p.type]||"🍽"}</span>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                textDecoration:isDel?"line-through":"none",opacity:isDel?.5:1}}>{p.nom}</div>
              <div style={{display:"flex",gap:3,marginTop:2,flexWrap:"wrap"}}>
                <Tag text={p.genre} color={C.tM}/><Tag text={`${p.temps_prepa}min`} color={C.tM}/>
                {p.batch!=="Non"&&<Tag text="Batch" color={C.gold}/>}
              </div>
            </div>
          </div>
          {isDel?<button onClick={()=>toggleDel(p.id)} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${C.ok}`,
            background:C.okBg,fontSize:10,cursor:"pointer",color:C.ok,fontWeight:600,whiteSpace:"nowrap"}}>↩ Restaurer</button>
          :<>{confirmDel===p.id?<div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button onClick={()=>toggleDel(p.id)} style={{padding:"4px 8px",borderRadius:8,border:"none",
              background:C.danger,fontSize:10,cursor:"pointer",color:"#fff",fontWeight:600}}>Oui</button>
            <button onClick={()=>setConfirmDel(null)} style={{padding:"4px 8px",borderRadius:8,border:`1px solid ${C.bdr}`,
              background:"#fff",fontSize:10,cursor:"pointer",color:C.tM}}>Non</button>
          </div>:<button onClick={(e)=>{e.stopPropagation();setConfirmDel(p.id);}} style={{padding:"4px 10px",borderRadius:8,
            border:`1px solid ${C.danger}33`,background:C.dangerBg,fontSize:10,cursor:"pointer",color:C.danger,
            whiteSpace:"nowrap"}}>🗑</button>}</>}
        </div>
      </div>);})}
    </div>
  </div>);
}

// ═══════ TAB 3 — COURSES ═══════
function CoursesTab({menu,profiles,stockCk,courseCk,setCk,stockOrder}){
  const grouped=useMemo(()=>{
    if(!menu)return[];
    const all=[...(menu.repas||[]),...(menu.entrees||[]),...(menu.salades||[])];
    const map={};
    all.forEach(plat=>{(plat.ingredients||[]).forEach(([nom,unite,qD,qM,qE])=>{
      const k=nom+"__"+unite;
      if(!map[k])map[k]={nom,unite,qD:0,qM:0,qE:0,cat:IC[nom]||"DIVERS"};
      map[k].qD+=(qD||0);map[k].qM+=(qM||0);map[k].qE+=(qE||0);
    });});
    const items=Object.values(map).map(it=>{
      let tot=0;
      if(profiles.includes("Damien"))tot+=it.qD;
      if(profiles.includes("Maroie"))tot+=it.qM;
      if(profiles.includes("Maël"))tot+=it.qE;
      return{...it,tot};
    }).filter(i=>i.tot>0);
    const early=new Set(),late=new Set();
    (menu.repas||[]).forEach(r=>{(r.ingredients||[]).forEach(([n])=>{if(r.jourIdx<3)early.add(n);else late.add(n);});});
    const freshOnly=new Set([...late].filter(n=>!early.has(n)));
    const result=[];
    CAT_ORDER.forEach(([ck,emoji])=>{
      const ciRaw=items.filter(i=>i.cat===ck);
      // Sort by stock order if available, else alphabetical
      const catFullName=CN[ck]||ck;
      const order=stockOrder&&stockOrder[catFullName];
      const ci=order?ciRaw.sort((a,b)=>{const ia=order.indexOf(a.nom);const ib=order.indexOf(b.nom);
        if(ia===-1&&ib===-1)return a.nom.localeCompare(b.nom,"fr");if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;}):
        ciRaw.sort((a,b)=>a.nom.localeCompare(b.nom,"fr"));
      const si=[];
      const sc=DATA.stock.find(c=>c.nom===(CN[ck]||ck));
      if(sc)sc.articles.forEach(art=>{if(stockCk[sc.nom+"__"+art.nom])
        if(!ci.some(i=>i.nom.toLowerCase().includes(art.nom.toLowerCase())||art.nom.toLowerCase().includes(i.nom.toLowerCase())))
          si.push({nom:art.nom,unite:"",tot:null,isStock:true,cat:ck});});
      const combined=[...ci,...si];
      if(combined.length)result.push({key:ck,name:CN[ck]||ck,emoji,items:combined,freshOnly});
    });
    return result;
  },[menu,profiles,stockCk]);

  const total=grouped.reduce((s,g)=>s+g.items.length,0);
  const checked=Object.values(courseCk).filter(Boolean).length;
  if(!menu)return<div style={{padding:20,textAlign:"center",color:C.tL}}><span style={{fontSize:40}}>🛒</span><p>Générez un menu.</p></div>;
  return(<div style={{padding:14,maxWidth:600,margin:"0 auto",textAlign:"center"}}>
    <div style={{background:"#fff",padding:"10px 14px",borderRadius:10,marginBottom:10,border:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{textAlign:"center",flex:1}}><h2 style={{margin:0,fontSize:15,fontWeight:700,color:C.forest}}>🛒 Courses</h2>
        <p style={{margin:"1px 0 0",fontSize:10,color:C.tL}}>Pour {profiles.join(", ")} · Ordre Intermarché</p></div>
      <span style={{padding:"4px 10px",borderRadius:16,fontSize:12,fontWeight:700,
        background:checked===total&&total?C.okBg:C.bg,color:checked===total&&total?C.ok:C.tM}}>{checked}/{total}</span>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:12,padding:"6px 10px",background:"#fff",borderRadius:8,border:`1px solid ${C.bdrL}`,fontSize:10}}>
      <span>🧊 = Jeu/Ven</span><span>📦 = Stock</span></div>
    {grouped.map(({key,name,emoji,items,freshOnly})=>(
      <div key={key} style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,padding:"5px 10px",background:C.forest+"0A",borderRadius:8}}>
          <span style={{fontSize:16}}>{emoji}</span><span style={{fontSize:12,fontWeight:700,color:C.forest}}>{name}</span>
          <span style={{fontSize:10,color:C.tL,marginLeft:"auto"}}>{items.length}</span></div>
        {items.map(item=>{const k=item.isStock?`stk__${name}__${item.nom}`:`ing__${item.nom}__${item.unite}`;
          const ck=courseCk[k];const isFO=freshOnly?.has(item.nom)&&!item.isStock;
          return(<div key={k} onClick={()=>{const n={...courseCk,[k]:!ck};setCk(n);}}
            style={{background:ck?C.okBg:"#fff",padding:"8px 10px",borderRadius:7,border:`1px solid ${ck?C.ok+"33":C.bdrL}`,
              marginBottom:2,display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
            <div style={{width:18,height:18,borderRadius:4,flexShrink:0,border:`2px solid ${ck?C.ok:C.bdr}`,
              background:ck?C.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {ck&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div>
            <span style={{flex:1,fontSize:12,fontWeight:500,textDecoration:ck?"line-through":"none",color:ck?C.tL:C.text}}>{item.nom}</span>
            {item.tot!=null&&<span style={{fontSize:12,fontWeight:700,color:C.fL,whiteSpace:"nowrap"}}>{fmtQ(item.tot,item.unite)}</span>}
            {item.isStock&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:5,background:C.gold+"20",color:C.gold,fontWeight:700}}>📦</span>}
            {isFO&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:5,background:"#E3F2FD",color:C.blue,fontWeight:700}}>🧊</span>}
          </div>);})}
      </div>
    ))}
    {total>0&&<div style={{marginTop:6,padding:"10px 12px",background:"#fff",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:11,color:C.tM}}>
      <strong>{grouped.length}</strong> rayons · <strong>{total}</strong> articles</div>}
  </div>);
}
function fmtQ(v,u){if(v==null)return"—";const r=Math.round(v*10)/10;const d=Number.isInteger(r)?r:r.toFixed(1);return u&&u!=="—"?`${d} ${u}`:`${d}`;}

// ═══════ TAB 4 — BATCH (restructuré : soir → salades → récap stratégie) ═══════
function BatchTab({menu:rawMenu}){
  const [openId,setOpenId]=useState(null);
  if(!rawMenu)return<div style={{padding:20,textAlign:"center",color:C.tL}}><span style={{fontSize:40}}>👨‍🍳</span><p>Générez un menu.</p></div>;
  const menu={...rawMenu,repas:rawMenu.repas||[],entrees:rawMenu.entrees||[],salades:rawMenu.salades||[]};

  const batchDay=(()=>{try{const d=new Date(menu.startDate||menu.at);const j=d.toLocaleDateString('fr-FR',{weekday:'long'});return j.charAt(0).toUpperCase()+j.slice(1);}catch(e){return"Dimanche";}})();
  const hasRiz=p=>p.ingredients?.some(i=>i[0]?.toLowerCase().includes("riz"));

  // ── Repas soir ──
  const batchR=menu.repas.filter(r=>r.batch==="Oui"||r.batch==="Partiel");
  const jourR=menu.repas.filter(r=>r.batch==="Non");
  // ── Entrées ──
  const batchE=(menu.entrees||[]).filter(e=>e.batch==="Oui"||e.batch==="Partiel");
  const jourE=(menu.entrees||[]).filter(e=>!e.batch||e.batch==="Non");
  // ── Salades midi ──
  const saladeBatch=(menu.salades||[]).filter(s=>s.batch!=="Non");
  const saladeJour=(menu.salades||[]).filter(s=>s.batch==="Non");
  const SALAD_BATCH_EXCLUDE=["prot_crevettes","prot_poulet","lcuit_champignon_saute","base_riz","base_nouilles_riz"];

  // ── Extraction étapes batch depuis recette ──
  function getBatchSteps(recette){
    if(!recette)return{batch:[],jourMeme:[]};
    const steps=recette.split(/(?=\d+\.)/).filter(s=>s.trim());
    return{batch:steps.filter(s=>s.toLowerCase().includes("batch")),jourMeme:steps.filter(s=>!s.toLowerCase().includes("batch"))};
  }

  // ── Build strategy repas soir + entrées ──
  function buildStrategy(batchPlats,batchEntrees){
    const tasks={four:[],feculents:[],legumineuses:[],oeufs:new Set(),decoupe:[],marinades:[],sauces:[],cuisson_longue:[],entrees:[]};
    batchPlats.forEach(p=>{
      const r=(p.recette||"").toLowerCase();
      const ings=(p.ingredients||[]).map(i=>i[0].toLowerCase());
      const allIngs=ings.join(" ");
      const hasPoulet=ings.some(i=>i.includes("poulet"));
      const hasViande=ings.some(i=>i.includes("viande")||i.includes("merguez"));
      const isFour=r.includes("four")||["gratin","lasagne","quiche","tarte","pizza","cake"].some(x=>r.includes(x)||p.type.toLowerCase().includes(x));
      if(isFour&&!hasPoulet)tasks.four.push({nom:p.nom,time:parseInt(p.temps_batch)||parseInt(p.temps_prepa)||20});
      if(hasPoulet||hasViande)tasks.marinades.push({nom:p.nom,detail:hasPoulet?"Marinade poulet":"Marinade viande"});
      const fecs=["pâtes","quinoa","boulgour","couscous"].filter(f=>allIngs.includes(f));
      if(fecs.length)tasks.feculents.push({nom:p.nom,fec:fecs.join(", "),time:parseInt(p.temps_batch)||15});
      const legs=["lentilles","pois chiche","haricots"].filter(f=>allIngs.includes(f));
      if(legs.length&&!fecs.length)tasks.legumineuses.push({nom:p.nom,leg:legs.join(", ")});
      if(r.includes("œufs durs")||r.includes("œufs mollets")||r.includes("œuf dur")||r.includes("œuf mollet"))tasks.oeufs.add("repas");
      const legDec=ings.filter(i=>["carotte","poivron","oignon","courgette","concombre","poireau","brocoli","champignon","chou","betterave","patate","aubergine","tomate"].some(l=>i.includes(l)));
      if(legDec.length>=2)tasks.decoupe.push({nom:p.nom,count:legDec.length});
      const totalTime=parseInt(p.temps_prepa)||0;
      if(totalTime>25||parseInt(p.temps_batch)>30)tasks.cuisson_longue.push({nom:p.nom,time:totalTime});
    });
    (batchEntrees||[]).forEach(e=>{tasks.entrees.push({nom:e.nom,time:parseInt(e.temps_batch)||parseInt(e.temps_prepa)||10,batch:e.batch});});
    return tasks;
  }
  const strategy=buildStrategy(batchR,batchE);
  const totalBatchTimeSoir=[...batchR,...batchE].reduce((s,p)=>{const t=parseInt(p.temps_batch)||0;return s+t;},0);

  // ── Build salade batch items ──
  function buildSaladBatchItems(){
    const items={};
    saladeBatch.forEach(s=>{
      // Les salades du menu ont maintenant un champ composition (ajouté par buildSaladForMenu)
      const comp=s.composition;
      if(!comp)return;
      Object.values(comp).flat().forEach(id=>{
        if(SALAD_BATCH_EXCLUDE.includes(id))return;
        const ing=SALAD_ALL_INGS[id];
        if(!ing||ing.batch!==true)return;
        if(!items[id]){
          let cat="Autre";
          if(["base_quinoa","base_boulgour","base_pates","base_lentilles","base_pdt","base_patate_douce"].includes(id))cat="feculents";
          else if(id==="prot_oeuf")cat="oeufs";
          else if(id==="prot_pois_chiches")cat="legumineuses";
          else if(["lcuit_patdouce","lcuit_poivrons_grilles"].includes(id))cat="four";
          else if(id.startsWith("marin_"))cat="pickles";
          items[id]={nom:ing.nom,emoji:ing.emoji||"",cat,qty_g:0,count:0,salades:[]};
        }
        items[id].qty_g+=Math.round((ing.portion_g||ing.portion_ml||0)*3.3);
        items[id].count++;
        items[id].salades.push(s.nom);
      });
    });
    return items;
  }
  const saladBatchItems=saladeBatch.length>0?buildSaladBatchItems():{};
  const sbBycat={feculents:[],oeufs:[],legumineuses:[],four:[],pickles:[]};
  Object.entries(saladBatchItems).forEach(([id,it])=>{if(sbBycat[it.cat])sbBycat[it.cat].push({...it,id});});
  const SBCAT_LABELS={feculents:{e:"🌾",l:"Féculents"},oeufs:{e:"🥚",l:"Œufs"},legumineuses:{e:"🫘",l:"Légumineuses"},four:{e:"🍠",l:"Rôtissage four"},pickles:{e:"🥒",l:"Pickles"}};

  // ── Estimation quantités repas soir ──
  function getRepasQty(n){n=n.toLowerCase();if(n.includes("quinoa"))return 240;if(n.includes("pâtes"))return 240;if(n.includes("boulgour"))return 240;if(n.includes("lentilles"))return 240;if(n.includes("couscous"))return 240;return 200;}

  // ── Récap : construire les totaux combinés ──
  function buildRecap(){
    const rc={feculents:{},oeufs:{repas:0,salades:0},legumineuses:{},four:{},pickles:{},entreesPrep:[],marinades:[],decoupe:[],cuisson_longue:[]};
    strategy.feculents.forEach(f=>{const k=f.fec.toLowerCase();if(!rc.feculents[k])rc.feculents[k]={nom:f.fec,repas:0,salades:0};rc.feculents[k].repas+=getRepasQty(f.fec);});
    sbBycat.feculents.forEach(it=>{const k=it.nom.toLowerCase();if(!rc.feculents[k])rc.feculents[k]={nom:it.nom,repas:0,salades:0};rc.feculents[k].salades+=it.qty_g;});
    if(strategy.oeufs.size>0)rc.oeufs.repas=batchR.filter(p=>(p.recette||"").toLowerCase().includes("œuf")).length*3;
    const salOeufs=sbBycat.oeufs.find(si=>si.id==="prot_oeuf");
    if(salOeufs)rc.oeufs.salades=salOeufs.count*3;
    strategy.legumineuses.forEach(f=>{const k=f.leg.toLowerCase();if(!rc.legumineuses[k])rc.legumineuses[k]={nom:f.leg,repas:0,salades:0};rc.legumineuses[k].repas+=240;});
    sbBycat.legumineuses.forEach(it=>{const k=it.nom.toLowerCase();if(!rc.legumineuses[k])rc.legumineuses[k]={nom:it.nom,repas:0,salades:0};rc.legumineuses[k].salades+=it.qty_g;});
    sbBycat.four.forEach(it=>{rc.four[it.id]={nom:it.nom,emoji:it.emoji,qty:it.qty_g,count:it.count};});
    sbBycat.pickles.forEach(it=>{rc.pickles[it.id]={nom:it.nom,emoji:it.emoji,qty:it.qty_g,count:it.count};});
    rc.entreesPrep=strategy.entrees;rc.marinades=strategy.marinades;rc.decoupe=strategy.decoupe;rc.cuisson_longue=strategy.cuisson_longue;
    return rc;
  }
  const recap=buildRecap();
  const totalSaladBatchTime=saladeBatch.length*5;
  const totalStratTime=Math.max(totalBatchTimeSoir+totalSaladBatchTime,30);

  return(
    <div style={{padding:14,maxWidth:600,margin:"0 auto"}}>
      {/* ═══ HEADER ═══ */}
      <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${C.bdr}`,textAlign:"center"}}>
        <h2 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:C.forest}}>👨‍🍳 Batch Cooking — {batchDay}</h2>
        <p style={{margin:0,fontSize:11,color:C.tL}}>
          {batchR.length} plat{batchR.length>1?"s":""} · {batchE.length} entrée{batchE.length>1?"s":""} · {saladeBatch.length} salade{saladeBatch.length>1?"s":""}
        </p>
      </div>

      {/* ═══ 1. NOMS PLATS + ENTRÉES À BATCHER ═══ */}
      {(batchR.length>0||batchE.length>0)&&<div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${C.gold}33`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:6}}>🍽 Repas du soir à batcher</div>
        {batchR.map(p=>(
          <div key={p.id} style={{fontSize:11,color:C.tM,paddingLeft:8,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>{ET[p.type]||"🍽"}</span><span style={{flex:1}}>{p.nom}</span>
            <span style={{fontSize:9,padding:"1px 6px",borderRadius:6,marginLeft:"auto",background:p.batch==="Oui"?C.okBg:C.gold+"15",color:p.batch==="Oui"?C.ok:C.gold,fontWeight:700}}>{p.batch==="Oui"?"Complet":"Partiel"}</span>
          </div>
        ))}
        {batchE.length>0&&<>
          <div style={{fontSize:11,fontWeight:600,color:C.gold,marginTop:6,marginBottom:4}}>🥕 Entrées</div>
          {batchE.map(e=>(
            <div key={e.id} style={{fontSize:11,color:C.tM,paddingLeft:8,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>🥕</span><span style={{flex:1}}>{e.nom}</span>
              <span style={{fontSize:9,padding:"1px 6px",borderRadius:6,marginLeft:"auto",background:e.batch==="Oui"?C.okBg:C.gold+"15",color:e.batch==="Oui"?C.ok:C.gold,fontWeight:700}}>{e.batch==="Oui"?"Complet":"Partiel"}</span>
            </div>
          ))}
        </>}
      </div>}

      {/* ═══ 2. DÉTAIL BATCH SOIR (temps + étapes) ═══ */}
      {(batchR.length>0||batchE.length>0)&&<div style={{background:C.gold+"08",borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${C.gold}22`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:8}}>📋 Détail batch soir</div>
        {batchR.map(p=>{
          const {batch:bSteps}=getBatchSteps(p.recette);
          const isOpen=openId===p.id;
          return(<div key={p.id} style={{marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>{ET[p.type]||"🍽"}</span>
              <span style={{fontSize:11,fontWeight:600,flex:1}}>{p.nom}</span>
              <span style={{fontSize:10,color:C.gold}}>⏱ {p.temps_batch!=="—"?p.temps_batch:p.temps_prepa} min</span>
            </div>
            {hasRiz(p)&&<div style={{marginTop:4,padding:"4px 8px",borderRadius:6,background:C.dangerBg,fontSize:10,color:C.danger}}>⚠️ Riz : cuire au dernier moment !</div>}
            <button onClick={()=>setOpenId(isOpen?null:p.id)} style={{marginTop:4,background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.fL,fontWeight:600,padding:0}}>▸ {isOpen?"Masquer":"Voir détail"}</button>
            {isOpen&&bSteps.length>0&&<div style={{padding:"6px 8px",borderRadius:6,background:C.gold+"12",marginTop:4}}>
              {bSteps.map((s,i)=><div key={i} style={{fontSize:10,color:C.text,lineHeight:1.5}}>{s.trim()}</div>)}
            </div>}
          </div>);
        })}
        {batchE.length>0&&<div style={{borderTop:`1px solid ${C.bdr}`,marginTop:8,paddingTop:8}}>
          <div style={{fontSize:11,fontWeight:600,color:C.gold,marginBottom:4}}>🥕 Entrées</div>
          {batchE.map(e=>(
            <div key={e.id} style={{fontSize:11,color:C.tM,display:"flex",gap:6,marginBottom:2}}>
              <span style={{flex:1}}>{e.nom}</span>
              <span style={{fontSize:10,color:C.gold}}>⏱ {e.temps_batch||e.temps_prepa} min</span>
            </div>
          ))}
        </div>}
      </div>}

      {/* ═══ Jour même (repas + entrées) ═══ */}
      {(jourR.length>0||jourE.length>0)&&<div style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:600,color:C.tL,textAlign:"center",marginBottom:4}}>🔵 Jour même ({jourR.length+jourE.length})</div>
        {jourR.map(p=>(<div key={p.id} style={{background:"#fff",borderRadius:8,padding:"6px 10px",border:`1px solid ${C.bdr}`,marginBottom:3,display:"flex",alignItems:"center",gap:6,fontSize:11}}>
          <span>{ET[p.type]||"🍽"}</span><span style={{flex:1}}>{p.nom}</span><span style={{fontSize:10,color:C.tL}}>{p.jour} · {p.temps_prepa}min</span>
        </div>))}
        {jourE.map(e=>(<div key={e.id} style={{background:"#fff",borderRadius:8,padding:"6px 10px",border:`1px solid ${C.bdr}`,marginBottom:3,display:"flex",alignItems:"center",gap:6,fontSize:11}}>
          <span>🥕</span><span style={{flex:1}}>{e.nom}</span><span style={{fontSize:10,color:C.tL}}>{e.temps_prepa}min</span>
        </div>))}
      </div>}

      {/* ═══ 3. NOMS SALADES À BATCHER ═══ */}
      {saladeBatch.length>0&&<div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${C.ok}33`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.fL,marginBottom:6}}>🥗 Salades midi à batcher ({saladeBatch.length})</div>
        {saladeBatch.map(s=>{
          const estTime=parseInt(s.temps_batch)||parseInt(s.temps_prepa)||10;
          return(<div key={s.id} style={{fontSize:11,color:C.tM,paddingLeft:8,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
            <span>🥗</span><span style={{flex:1}}>{s.nom}</span>
            <span style={{fontSize:10,color:C.fL}}>~{estTime} min batch</span>
          </div>);
        })}
        {saladeJour.length>0&&<div style={{marginTop:6,fontSize:10,color:C.tL}}>+ {saladeJour.length} salade{saladeJour.length>1?"s":""} jour même</div>}
      </div>}

      {/* ═══ 4. BLOC BATCH SALADES (quantités seules) ═══ */}
      {saladeBatch.length>0&&Object.values(sbBycat).some(a=>a.length>0)&&
      <div style={{background:"#F0FFF0",borderRadius:10,padding:12,marginBottom:10,border:`1px solid ${C.ok}33`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.fL,marginBottom:8}}>📦 Préparations salades — quantités</div>
        {Object.entries(SBCAT_LABELS).map(([cat,{e,l}])=>{
          const items=sbBycat[cat];if(!items||!items.length)return null;
          return(<div key={cat} style={{marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:C.text}}>{e} {l} :</div>
            {items.map(it=>{
              const unit=cat==="oeufs"?(it.count*3)+"":it.qty_g+"g";
              return(<div key={it.id} style={{fontSize:11,color:C.tM,paddingLeft:12}}>• {it.emoji} {it.nom} — {unit}{it.count>1?" (×"+it.count+" salades)":""}</div>);
            })}
          </div>);
        })}
      </div>}

      {/* ═══ 5. RÉCAPITULATIF STRATÉGIE — QUANTITÉS TOTALES + PLANNING ═══ */}
      {(batchR.length>0||batchE.length>0||saladeBatch.length>0)&&<div style={{marginTop:6,background:C.gold+"12",borderRadius:12,padding:14,border:`1px solid ${C.gold}33`}}>
        <h3 style={{margin:"0 0 10px",fontSize:14,fontWeight:700,color:C.gold,textAlign:"center"}}>📋 Récapitulatif — {batchDay}</h3>
        <div style={{fontSize:10,color:C.tL,textAlign:"center",marginBottom:10}}>Quantités totales (entrées + plats soir + salades midi)</div>

        {strategy.four.length>0&&<div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>1. 🔥 Cuissons au four :</div>
          {strategy.four.map((t,i)=><div key={i} style={{fontSize:11,color:C.tM,paddingLeft:12}}>• {t.nom} — ~{t.time} min</div>)}
          {Object.values(recap.four).map(it=><div key={it.nom} style={{fontSize:11,color:C.fL,paddingLeft:12}}>• {it.emoji} {it.nom} — {it.qty}g <span style={{fontSize:10,color:C.tL}}>(salades)</span></div>)}
        </div>}

        {Object.keys(recap.feculents).length>0&&<div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>2. 🍝 Féculents :</div>
          {Object.values(recap.feculents).map(f=>{
            const total=f.repas+f.salades;const d=[];
            if(f.repas>0)d.push("repas "+f.repas+"g");if(f.salades>0)d.push("salades "+f.salades+"g");
            return<div key={f.nom} style={{fontSize:11,color:C.tM,paddingLeft:12}}>• {f.nom} — <strong style={{color:C.text}}>{total}g</strong>{d.length>1&&<span style={{fontSize:10,color:C.gold}}> ({d.join(" + ")})</span>}</div>;
          })}
        </div>}

        {Object.keys(recap.legumineuses).length>0&&<div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>3. 🫘 Légumineuses :</div>
          {Object.values(recap.legumineuses).map(f=>{
            const total=f.repas+f.salades;const d=[];
            if(f.repas>0)d.push("repas "+f.repas+"g");if(f.salades>0)d.push("salades "+f.salades+"g");
            return<div key={f.nom} style={{fontSize:11,color:C.tM,paddingLeft:12}}>• {f.nom} — <strong style={{color:C.text}}>{total}g</strong>{d.length>1&&<span style={{fontSize:10,color:C.gold}}> ({d.join(" + ")})</span>}</div>;
          })}
        </div>}

        {(recap.oeufs.repas+recap.oeufs.salades)>0&&<div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>4. 🥚 Œufs durs :</div>
          {(()=>{const t=recap.oeufs.repas+recap.oeufs.salades;const d=[];
            if(recap.oeufs.repas>0)d.push("repas "+recap.oeufs.repas);if(recap.oeufs.salades>0)d.push("salades "+recap.oeufs.salades);

// ═══════ TAB 5 — STOCK ═══════
function StockTab({stockCk,setStockCk,stockOrder,setStockOrder,customArt,setCustomArt}){
  const [search,setSearch]=useState("");
  const [catF,setCatF]=useState("all");
  const [dragCat,setDragCat]=useState(null);
  const [dragIdx,setDragIdx]=useState(null);
  const [dragOverIdx,setDragOverIdx]=useState(null);
  const touchStart=React.useRef(null);
  const [addingTo,setAddingTo]=useState(null);
  const [newArtName,setNewArtName]=useState("");
  const [renamingKey,setRenamingKey]=useState(null);
  const [renameVal,setRenameVal]=useState("");
  const nonAlim=["SANITAIRES","PRODUITS MÉNAGERS","DIVERS"];
  const ECat={"BOISSONS ET SIROPS":"🥤","ALIMENTS SUCRÉS":"🍫",
    "CONSERVES ET BOCAUX":"🥫","FÉCULENTS ET CÉRÉALES":"🌾",
    "SAUCES ET AIDES CULINAIRES":"🫙","BOULANGERIE / TORTILLAS":"🍞",
    "HUILES ET VINAIGRES":"🫒","ÉPICES ET CONDIMENTS":"🧂",
    "SANITAIRES":"🧴","PRODUITS MÉNAGERS":"🧹","DIVERS":"📦",
    "FRAIS CRÉMERIE":"🧀","FRAIS TRAITEUR / PÂTES":"🥧",
    "FRAIS PROTÉINES":"🥩","FRUITS":"🍎","FRUITS SECS":"🥜",
    "LÉGUMES FRAIS":"🥬","HERBES ET AROMATES FRAIS":"🌿","SURGELÉS":"❄️"};

  // Get ordered articles for a category
  function getOrdered(cat){
    // Base articles + custom added - custom deleted, with renames applied
    let names=cat.articles.map(a=>a.nom);
    // Add custom articles for this category
    if(customArt.add){customArt.add.forEach(a=>{if(a.cat===cat.nom&&!names.includes(a.nom))names.push(a.nom);});}
    // Remove deleted
    if(customArt.del){names=names.filter(n=>!customArt.del.includes(cat.nom+"__"+n));}
    // Apply renames
    if(customArt.ren){names=names.map(n=>customArt.ren[cat.nom+"__"+n]||n);}
    const order=stockOrder[cat.nom];
    if(!order)return names;
    const ordered=order.filter(n=>names.includes(n));
    const newItems=names.filter(n=>!order.includes(n));
    return [...ordered,...newItems];
  }

  function addArticle(catNom,nom){
    if(!nom.trim())return;
    const next={...customArt,add:[...(customArt.add||[]),{cat:catNom,nom:nom.trim()}]};
    setCustomArt(next);setNewArtName("");setAddingTo(null);
  }
  function deleteArticle(catNom,artNom){
    if(!confirm("Supprimer "+artNom+" ?"))return;
    const next={...customArt,del:[...(customArt.del||[]),catNom+"__"+artNom]};
    setCustomArt(next);
  }
  function renameArticle(catNom,oldName,newName){
    if(!newName.trim())return;
    const next={...customArt,ren:{...(customArt.ren||{}),[catNom+"__"+oldName]:newName.trim()}};
    setCustomArt(next);setRenamingKey(null);setRenameVal("");
  }

  function moveArticle(catNom,fromIdx,toIdx){
    if(fromIdx===toIdx)return;
    const cat=DATA.stock.find(c=>c.nom===catNom);
    if(!cat)return;
    const ordered=getOrdered(cat);
    const item=ordered[fromIdx];
    const next=[...ordered];
    next.splice(fromIdx,1);
    next.splice(toIdx,0,item);
    const newOrder={...stockOrder,[catNom]:next};
    setStockOrder(newOrder);
  }

  const filtered=useMemo(()=>{
    let cats=DATA.stock;
    if(catF!=="all")cats=cats.filter(c=>c.nom===catF);
    if(search.trim()){const q=search.toLowerCase();cats=cats.map(c=>({...c,articles:c.articles.filter(a=>a.nom.toLowerCase().includes(q))})).filter(c=>c.articles.length);}
    return cats;
  },[catF,search]);
  const ckCount=Object.values(stockCk).filter(Boolean).length;
  const isSearching=search.trim().length>0;

  return(<div style={{padding:14,maxWidth:600,margin:"0 auto",textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h2 style={{margin:0,fontSize:16,fontWeight:700,color:C.forest,textAlign:"center"}}>📦 Stock</h2>
      {ckCount>0&&<span style={{padding:"3px 8px",borderRadius:12,fontSize:11,fontWeight:600,background:C.gold+"15",color:C.gold}}>{ckCount} à racheter</span>}
    </div>
    <div style={{position:"relative",marginBottom:8}}>
      <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13}}>🔍</span>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Chercher..."
        style={{width:"100%",padding:"7px 10px 7px 30px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:12,background:"#fff",boxSizing:"border-box"}}/>
    </div>
    {!isSearching&&<p style={{fontSize:10,color:C.tL,marginBottom:8}}>↕️ Maintenez et glissez pour réordonner</p>}
    <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:6,marginBottom:10,justifyContent:"center",flexWrap:"wrap"}}>
      <Chip label="Tout" on={catF==="all"} click={()=>setCatF("all")}/>
      {DATA.stock.map(c=><Chip key={c.nom} label={`${ECat[c.nom]||""} ${c.nom}`} on={catF===c.nom} click={()=>setCatF(c.nom)}/>)}
    </div>
    {filtered.map(cat=>{
      const orderedNames=isSearching?cat.articles.map(a=>a.nom):getOrdered(cat);
      return(<div key={cat.nom} style={{marginBottom:14}}>
      <h3 style={{fontSize:12,fontWeight:700,color:C.forest,marginBottom:5,display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
        {ECat[cat.nom]||"📦"} {cat.nom} <span style={{fontSize:10,color:C.tL,fontWeight:400}}>({orderedNames.length})</span></h3>
      {nonAlim.includes(cat.nom)&&addingTo===cat.nom?
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          <input type="text" value={newArtName} onChange={e=>setNewArtName(e.target.value)}
            placeholder="Nom du nouvel article..." autoFocus
            style={{flex:1,padding:"6px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:12,boxSizing:"border-box"}}
            onKeyDown={e=>{if(e.key==="Enter")addArticle(cat.nom,newArtName);}}/>
          <button onClick={()=>addArticle(cat.nom,newArtName)} style={{padding:"6px 10px",borderRadius:6,
            background:C.fL,color:"#fff",border:"none",fontSize:11,cursor:"pointer"}}>OK</button>
          <button onClick={()=>{setAddingTo(null);setNewArtName("");}} style={{padding:"6px 8px",borderRadius:6,
            border:`1px solid ${C.bdr}`,background:"#fff",fontSize:11,cursor:"pointer"}}>X</button>
        </div>
      :nonAlim.includes(cat.nom)&&<button onClick={()=>setAddingTo(cat.nom)} style={{marginBottom:6,padding:"5px 10px",
        borderRadius:6,border:`1px dashed ${C.fL}`,background:"transparent",fontSize:11,cursor:"pointer",color:C.fL}}>
        + Ajouter un article</button>}
      {orderedNames.map((artNom,idx)=>{const k=cat.nom+"__"+artNom;const ck=stockCk[k];
        const isDragging=dragCat===cat.nom&&dragIdx===idx;
        const isDragOver=dragCat===cat.nom&&dragOverIdx===idx;
        return <div key={artNom}
          draggable={!isSearching}
          onDragStart={e=>{setDragCat(cat.nom);setDragIdx(idx);e.dataTransfer.effectAllowed="move";}}
          onDragOver={e=>{e.preventDefault();if(dragCat===cat.nom)setDragOverIdx(idx);}}
          onDragEnd={()=>{if(dragCat===cat.nom&&dragIdx!==null&&dragOverIdx!==null)moveArticle(cat.nom,dragIdx,dragOverIdx);
            setDragCat(null);setDragIdx(null);setDragOverIdx(null);}}
          onTouchStart={e=>{touchStart.current={cat:cat.nom,idx,y:e.touches[0].clientY};}}
          onTouchMove={e=>{
            if(!touchStart.current||touchStart.current.cat!==cat.nom)return;
            const touch=e.touches[0];
            const el=document.elementFromPoint(touch.clientX,touch.clientY);
            if(el){const row=el.closest("[data-didx]");
              if(row){const newIdx=parseInt(row.dataset.didx);
                if(!isNaN(newIdx)&&newIdx!==dragOverIdx){setDragCat(cat.nom);setDragIdx(touchStart.current.idx);setDragOverIdx(newIdx);}}}
          }}
          onTouchEnd={()=>{if(dragCat===cat.nom&&dragIdx!==null&&dragOverIdx!==null)moveArticle(cat.nom,dragIdx,dragOverIdx);
            touchStart.current=null;setDragCat(null);setDragIdx(null);setDragOverIdx(null);}}
          data-didx={idx}
          style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
            background:isDragOver?"#E8F5E9":isDragging?"#FFF8E1":ck?C.gold+"08":"#fff",
            borderRadius:6,cursor:isSearching?"pointer":"grab",
            border:`1px solid ${isDragOver?C.ok+"66":ck?C.gold+"33":C.bdrL}`,marginBottom:2,
            opacity:isDragging?.5:1,transition:"background .15s, border .15s",
            userSelect:"none",WebkitUserSelect:"none"}}>
          {!isSearching&&<span style={{fontSize:10,color:C.tL,cursor:"grab",padding:"2px",flexShrink:0}}>☰</span>}
          <div onClick={()=>{const n={...stockCk,[k]:!ck};setStockCk(n);}}
            style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${ck?C.gold:C.bdr}`,
              background:ck?C.gold:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {ck&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div>
            {renamingKey===cat.nom+"__"+artNom?
              <div style={{display:"flex",gap:4,flex:1}} onClick={e=>e.stopPropagation()}>
                <input type="text" value={renameVal} onChange={e=>setRenameVal(e.target.value)} autoFocus
                  style={{flex:1,padding:"3px 6px",borderRadius:4,border:`1px solid ${C.bdr}`,fontSize:11}}
                  onKeyDown={e=>{if(e.key==="Enter")renameArticle(cat.nom,artNom,renameVal);}}/>
                <button onClick={()=>renameArticle(cat.nom,artNom,renameVal)} style={{padding:"3px 6px",borderRadius:4,
                  background:C.fL,color:"#fff",border:"none",fontSize:10,cursor:"pointer"}}>OK</button>
                <button onClick={()=>setRenamingKey(null)} style={{padding:"3px 6px",borderRadius:4,
                  border:`1px solid ${C.bdr}`,background:"#fff",fontSize:10,cursor:"pointer"}}>X</button>
              </div>
            :<><span style={{fontSize:12,textAlign:"left",flex:1}}>{artNom}</span>
              {nonAlim.includes(cat.nom)&&<div style={{display:"flex",gap:2,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>{setRenamingKey(cat.nom+"__"+artNom);setRenameVal(artNom);}} style={{padding:"2px 5px",borderRadius:4,
                  border:`1px solid ${C.bdrL}`,background:"#fff",fontSize:9,cursor:"pointer",color:C.tL}}>✏️</button>
                <button onClick={()=>deleteArticle(cat.nom,artNom)} style={{padding:"2px 5px",borderRadius:4,
                  border:`1px solid ${C.danger}22`,background:C.dangerBg,fontSize:9,cursor:"pointer",color:C.danger}}>🗑</button>
              </div>}</>}
          </div>
        </div>;})}
    </div>);})}
  </div>);
}

// ═══════ PUSH NOTIFICATION BUTTON ═══════
function PushButton(){
  const [status,setStatus]=useState("checking");
  useEffect(()=>{
    const check=()=>{
      if(!("serviceWorker" in navigator)||!("PushManager" in window)){setStatus("unsupported");return;}
      if(Notification.permission==="denied"){setStatus("denied");return;}
      if(window._pushStatus==="subscribed"){setStatus("subscribed");return;}
      if(window._pushStatus==="ready"){setStatus("ready");return;}
      setStatus("checking");
    };
    check();
    const t=setInterval(check,1000);
    return()=>clearInterval(t);
  },[]);

  const handleClick=async()=>{
    if(!window._pushSubscribe){setStatus("error");return;}
    setStatus("requesting");
    const result=await window._pushSubscribe();
    if(result==="ok")setStatus("subscribed");
    else if(result==="denied")setStatus("denied");
    else setStatus("error");
  };

  if(status==="unsupported")return(
    <div style={{marginTop:12,padding:12,background:"#FFF3E0",borderRadius:8,fontSize:11,color:"#E65100"}}>
      ⚠️ Les notifications push ne sont pas supportées sur ce navigateur. Ouvrez l'app depuis l'écran d'accueil (PWA).
    </div>);
  if(status==="denied")return(
    <div style={{marginTop:12,padding:12,background:"#FFEBEE",borderRadius:8,fontSize:11,color:"#C62828"}}>
      🔕 Notifications refusées. Allez dans Réglages → Notifications → La Table Familiale pour les réactiver.
    </div>);
  if(status==="subscribed")return(
    <div style={{marginTop:12,padding:12,background:"#E8F5E9",borderRadius:8,fontSize:11,color:"#2E7D32"}}>
      ✅ Notifications activées ! Vous recevrez les rappels achats frais, batch et cuisson.
    </div>);
  if(status==="checking")return(
    <div style={{marginTop:12,padding:12,background:"#F5F5F5",borderRadius:8,fontSize:11,color:"#757575"}}>
      ⏳ Vérification des notifications...
    </div>);
  return(
    <button onClick={handleClick} disabled={status==="requesting"} style={{
      marginTop:12,width:"100%",padding:14,background:C.forest,color:"#fff",
      border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",
      opacity:status==="requesting"?0.6:1}}>
      {status==="requesting"?"⏳ Activation en cours...":"🔔 Activer les notifications"}
    </button>);
}

// ═══════ TAB 6 — PROFILS (enrichi) ═══════
function NutriBar({value,target,label,unit="g"}){
  const pct=target>0?Math.min((value/target)*100,150):0;
  const st=pct<70?"#C62828":pct>120?"#E65100":"#2E7D32";
  return(<div style={{marginBottom:5}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:1}}>
      <span style={{fontWeight:600,color:"#374151"}}>{label}</span>
      <span style={{color:C.tM}}>{value}{unit} / {target}{unit}</span>
    </div>
    <div style={{height:5,borderRadius:3,background:C.bdr,overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:3,background:st,width:`${Math.min(pct,100)}%`,transition:"width 0.4s ease"}}/>
    </div>
  </div>);
}

function NutriDashboard({menu}){
  const JOURS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
  const profNames=["Damien","Maroie","Maël"];
  const profMeta={
    Damien:{emoji:"👨",color:C.fL},Maroie:{emoji:"👩",color:C.pink},"Maël":{emoji:"👦",color:C.blue}
  };
  const [activeProfil,setActiveProfil]=useState("Damien");
  const [dayView,setDayView]=useState(false);

  const m=menu?{repas:menu.repas||[],entrees:menu.entrees||[],salades:menu.salades||[]}:null;
  if(!m||m.repas.length===0)return(
    <div style={{background:"#fff",borderRadius:12,padding:20,border:`1px solid ${C.bdr}`,textAlign:"center",color:C.tM,fontSize:13}}>
      📊 Générez un menu pour voir le bilan nutritionnel.
    </div>
  );

  // Build targets per profile (déjeuner+dîner only)
  function getTargets(name){
    const p=DATA.profils[name];if(!p)return{kcal:0,prot:0,lip:0,gluc:0};
    const rep=p.repartition||{};
    const coveredKcal=(rep.dejeuner||0)+(rep.diner||0);
    const ratio=p.calories>0?coveredKcal/p.calories:0;
    return{kcal:coveredKcal,prot:Math.round((p.proteines||0)*ratio),lip:Math.round((p.lipides||0)*ratio),gluc:Math.round((p.glucides||0)*ratio)};
  }

  // Compute day totals
  function dayTotal(idx,name){
    const rM=m.repas[idx]?.macros?.[name]||{kcal:0,prot:0,lip:0,gluc:0};
    const eM=m.entrees[idx]?.macros?.[name]||{kcal:0,prot:0,lip:0,gluc:0};
    const sM=m.salades[idx]?.macros?.[name]||{kcal:0,prot:0,lip:0,gluc:0};
    return{kcal:rM.kcal+eM.kcal+sM.kcal,prot:rM.prot+eM.prot+sM.prot,lip:rM.lip+eM.lip+sM.lip,gluc:rM.gluc+eM.gluc+sM.gluc,
      detail:{dej:sM.kcal,entree:eM.kcal,diner:rM.kcal}};
  }

  // Week avg
  function weekAvg(name){
    const t=getTargets(name);const days=Math.min(m.repas.length,7);
    let tk=0,tp=0,tl=0,tg=0;
    for(let i=0;i<days;i++){const d=dayTotal(i,name);tk+=d.kcal;tp+=d.prot;tl+=d.lip;tg+=d.gluc;}
    const avg={kcal:Math.round(tk/days),prot:Math.round(tp/days),lip:Math.round(tl/days),gluc:Math.round(tg/days)};
    // Score
    const sc=Math.round(
      (Math.min(t.kcal>0?avg.kcal/t.kcal:0,1)*40+Math.min(t.prot>0?avg.prot/t.prot:0,1)*30+
       Math.min(t.lip>0?avg.lip/t.lip:0,1)*15+Math.min(t.gluc>0?avg.gluc/t.gluc:0,1)*15)
    );
    // Alerts
    const alerts=[];
    if(t.prot>0&&avg.prot<t.prot*0.7)alerts.push("⚠️ Protéines faibles ("+avg.prot+"g/j vs "+t.prot+"g)");
    if(t.kcal>0&&avg.kcal<t.kcal*0.7)alerts.push("⚠️ Calories insuffisantes");
    if(t.kcal>0&&avg.kcal>t.kcal*1.2)alerts.push("⚡ Excès calorique");
    if(t.lip>0&&avg.lip>t.lip*1.3)alerts.push("🧈 Lipides élevés ("+avg.lip+"g/j vs "+t.lip+"g)");
    return{avg,targets:t,score:sc,alerts};
  }

  // Summary card for one profile
  function SummaryCard({name}){
    const pm=profMeta[name];const{avg,targets:t,score,alerts}=weekAvg(name);
    const sColor=score>=85?"#2E7D32":score>=65?"#E65100":"#C62828";
    const sLabel=score>=85?"Excellent":score>=65?"Correct":"À ajuster";
    return(
      <div style={{background:`linear-gradient(135deg,${pm.color}08,${pm.color}12)`,borderRadius:14,padding:14,
        border:`1px solid ${pm.color}20`,marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:24}}>{pm.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:800,color:pm.color}}>{name}</div>
            <div style={{fontSize:10,color:C.tM}}>Déjeuner + Dîner</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:sColor,lineHeight:1}}>{score}%</div>
            <div style={{fontSize:9,fontWeight:700,color:sColor}}>{sLabel}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <NutriBar value={avg.kcal} target={t.kcal} label="Énergie" unit=" kcal"/>
          <NutriBar value={avg.prot} target={t.prot} label="Protéines"/>
          <NutriBar value={avg.lip} target={t.lip} label="Lipides"/>

function salIng(id){return SALAD_ALL_INGS[id]||{nom:id,emoji:"❓",portion_g:0,cal_100g:0,prot_100g:0};}
function salCalcNutri(comp,mult=1){
  let cal=0,prot=0,lip=0,gluc=0;
  Object.values(comp).forEach(ids=>ids.forEach(id=>{
    const i=salIng(id);const p=(i.portion_g||i.portion_ml||20)*mult;
    cal+=(i.cal_100g*p)/100;prot+=((i.prot_100g||0)*p)/100;
    lip+=((i.lip_100g||0)*p)/100;gluc+=((i.gluc_100g||0)*p)/100;
  }));
  return{cal:Math.round(cal),prot:Math.round(prot*10)/10,lip:Math.round(lip*10)/10,gluc:Math.round(gluc*10)/10};
}
function salAllIngs(comp){const items=[];Object.values(comp).forEach(ids=>ids.forEach(id=>items.push(salIng(id))));return items;}
function salGenRecipe(selectedIds){
  const batch=[],fresh=[];
  selectedIds.forEach(id=>{const i=salIng(id);if(i.batch)batch.push(i.nom);else fresh.push(i.nom);});
  let steps=[];
  if(batch.length)steps.push("**Batch : préparer "+batch.join(", ")+".**");
  steps.push("Préparer et assembler : "+fresh.join(", ")+".");
  steps.push("Assaisonner et servir.");
  return steps.map((s,i)=>(i+1)+". "+s).join(" ");
}
